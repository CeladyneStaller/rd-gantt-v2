<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>R&D Execution — Division</title>
<style>
  :root{
    --bg:#0f1620; --panel:#15202d; --panel2:#1b2937; --line:#26384a;
    --ink:#e6edf3; --muted:#8aa0b4; --accent:#3fd0c9; --accent2:#7ca8ff;
    --ok:#34d399; --warn:#fbbf24; --bad:#f87171; --none:#5b7186;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.02em}
  header h1 .dot{color:var(--accent)}
  header .div-pill{font-family:var(--mono);font-size:12px;background:var(--panel2);border:1px solid var(--line);padding:3px 9px;border-radius:6px;color:var(--accent)}
  .spacer{flex:1}
  main{padding:18px;max-width:1080px;margin:0 auto}
  .msg{padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:13px;display:none}
  .msg.show{display:block}
  .msg.info{background:#13314a;color:#add4ff;border:1px solid #1d4a6e}
  .msg.err{background:#3a1620;color:#ffb4bd;border:1px solid #5e2230}
  .msg.ok{background:#13311f;color:#9ff0c4;border:1px solid #1d5e3a}
  select.obj{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 10px;border-radius:8px;font-size:14px;min-width:340px}
  .objhead{display:flex;align-items:center;gap:16px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin:14px 0}
  .objhead .sc{font-size:40px;font-weight:800;line-height:1}
  .objhead .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
  .band{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .band.on-track{background:#10371f;color:var(--ok)} .band.at-risk{background:#3a2f10;color:var(--warn)}
  .band.off-track{background:#3a1414;color:var(--bad)} .band.no-band{background:#1c2733;color:var(--none)}
  .sub{margin:18px 0}
  .sub h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px;display:flex;align-items:center;gap:10px}
  .sub h3 button{margin-left:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .mono{font-family:var(--mono);font-size:12px}
  input,select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:6px 8px;border-radius:6px;font-family:var(--sans);font-size:13px}
  input.mono{font-family:var(--mono)}
  input.tiny{width:70px} input.sm{width:120px}
  button.act{background:var(--accent);color:#08121a;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}
  button.ghost{background:none;border:1px solid var(--line);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
  button.danger{color:var(--bad);border-color:#5e2230}
  button.danger.armed{background:var(--bad);color:#1a0a0c}
  button.mini{padding:3px 8px;font-size:12px}
  .row-actions{display:flex;gap:6px;align-items:center}
  .ed{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin:10px 0}
  .ed label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--muted)}
  .hint{color:var(--muted);font-size:12px;margin:8px 0}
  .pill{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .kpi-now{font-family:var(--mono);font-size:12px}
  .read-row{display:flex;gap:6px;align-items:center}
  code{font-family:var(--mono);background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
  .settings label{display:block;margin-bottom:10px;max-width:520px}
  .scwrap{display:flex;align-items:baseline;gap:10px}
  .hostcard{border:1px solid var(--line);border-radius:10px;margin:10px 0;overflow:hidden;background:var(--panel)}
  .hosthead{display:flex;align-items:center;gap:12px;padding:9px 14px;background:var(--panel2);border-bottom:1px solid var(--line)}
  .hosthead .hn{font-weight:600}
  .hosthead .hs{font-family:var(--mono);font-weight:700;font-size:15px}
  .hosthead .ha{margin-left:auto;display:flex;gap:6px;align-items:center}
  .hosthead .gate-meta{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center}
  table.kpitable{margin:0}
  table.kpitable td,table.kpitable th{padding:6px 14px}
  table.kpitable tbody tr:last-child td{border-bottom:none}
  .linkbadge{font-family:var(--mono);font-size:10px;color:var(--accent2);background:#16233e;border:1px solid #2a3a5a;border-radius:5px;padding:1px 5px;margin-left:4px;white-space:nowrap}
  .inherited{grid-column:1/-1;font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:7px 9px;line-height:1.6}
  .gate-sched{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--line);background:var(--panel);font-size:12px}
  .gate-sched .lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .gate-sched .sched-sep{color:var(--line)}
  .dep-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--accent2);background:#16233e;border:1px solid #2a3a5a;border-radius:5px;padding:2px 6px}
  .dep-chip button{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:13px;line-height:1;padding:0}
  .dep-chip button:hover{color:var(--bad)}
  .committed-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--warn);background:#3a2f10;border:1px solid #5a4a18;border-radius:5px;padding:2px 7px}
  select.edgepick{font-size:12px;padding:4px 6px;min-width:130px}
  input.laginp{width:56px}
  .chain-toggle{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;text-transform:none;letter-spacing:0}
  .chain-toggle input{width:auto;padding:0;margin:0}
  /* dashboard layout (tracker QT pattern, dark theme) */
  .obj-title{font-size:14px;color:var(--ink);margin:14px 0 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin:0 0 18px}
  .mc{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
  .mc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono);margin-bottom:8px}
  .mc-val{font-size:23px;font-weight:600;line-height:1;color:var(--ink)}
  .mc-val.small{font-size:14px;font-family:var(--mono)}
  .mc-sub{font-size:11px;color:var(--muted);margin-top:7px;font-family:var(--mono)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin:14px 0}
  .panel-header{display:flex;align-items:center;gap:10px;padding-bottom:9px;margin-bottom:10px;border-bottom:1px solid var(--line)}
  .panel-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .panel-title .chev{font-size:9px;transition:transform .15s;display:inline-block;color:var(--none)}
  .panel-title.collapsed .chev{transform:rotate(-90deg)}
  .panel-title .cnt{font-family:var(--mono);font-size:10px;color:var(--none);font-weight:400}
  .panel-header .ha{margin-left:auto;display:flex;gap:8px;align-items:center}
  .item-list{display:flex;flex-direction:column;gap:8px}
  .item-list.collapsed{display:none}
  .icard{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel2)}
  .icard-top{display:flex;align-items:center;gap:10px;padding:8px 12px}
  .icard-num{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent2);background:#16233e;border:1px solid #2a3a5a;border-radius:6px;padding:2px 7px;flex:none;cursor:pointer}
  .icard-title{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .icard-title.click{cursor:pointer}
  .icard-title.click:hover{color:var(--accent)}
  .rowedit{cursor:pointer;color:var(--ink);text-decoration:none;border-bottom:1px dotted transparent}
  .rowedit:hover{color:var(--accent);border-bottom-color:var(--accent)}
  .icard-score{font-family:var(--mono);font-weight:700;font-size:15px;flex:none}
  .icard-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex:none}
  .icard-actions .gate-meta{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .icard-meta{border-top:1px solid var(--line);background:var(--panel)}
  .statepill{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-radius:5px;padding:2px 7px;flex:none}
  .statepill.passed{background:#10371f;color:var(--ok)}
  .statepill.passed-late{background:#3a2f10;color:var(--warn)}
  .statepill.overdue{background:#3a1414;color:var(--bad)}
  .statepill.pending{background:#1c2733;color:var(--none)}
  /* modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-start;justify-content:center;padding:48px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .overlay .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:600px;box-shadow:0 16px 48px rgba(0,0,0,.5);margin:auto;overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .modal-title{font-size:14px;font-weight:600;color:var(--ink);flex:1}
  .modal-x{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
  .modal-x:hover{color:var(--ink)}
  #modalBody{padding:16px 18px}
  #modalBody .ed{margin:0 0 14px}
  #modalBody .row-actions{justify-content:flex-end;border-top:1px solid var(--line);padding-top:12px;margin:14px 0 0 !important}
  .modal-section-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:var(--mono);margin:14px 0 8px;display:block}
  .gt-head{display:flex;align-items:center;gap:10px;margin:0 0 8px}
  .gt-acts{margin-left:auto;display:flex;gap:6px;flex:none}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg-btn{background:var(--panel2);border:none;border-right:1px solid var(--line);color:var(--muted);padding:6px 13px;font-size:12px;cursor:pointer}
  .seg-btn:last-child{border-right:none}
  .seg-btn:hover{color:var(--ink)}
  .seg-btn.seg-pending{background:#1c2733;color:var(--ink)}
  .seg-btn.seg-active{background:#16233e;color:var(--accent2)}
  .seg-btn.seg-hit{background:#10371f;color:var(--ok)}
  .seg-btn.seg-missed{background:#3a1414;color:var(--bad)}
  .seg-btn.on{background:#16233e;color:var(--accent2)}
  .modal-field{margin:0 0 12px}
  .modal-field>.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px}
  #modalBody .modal-field input[type=text],#modalBody .modal-field input[type=number],#modalBody .modal-field select,#subkrBody .modal-field input[type=text],#subkrBody .modal-field input[type=number],#subkrBody .modal-field select{width:100%}
  #subkrBody{padding:16px 18px}
  #subkrBody .row-actions{justify-content:flex-end;border-top:1px solid var(--line);padding-top:12px;margin:14px 0 0}
  input[type=range]{accent-color:var(--accent);height:4px}
  .pct-row{display:flex;align-items:center;gap:10px}
  .pct-val{font-family:var(--mono);font-size:12px;font-weight:600;min-width:34px;text-align:right;color:var(--ink)}
  .skr-list{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .skr-row{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:var(--panel2)}
  .skr-row .skr-name{flex:1;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .skr-row .skr-name:hover{color:var(--accent)}
  .skr-row .skr-meta{font-family:var(--mono);font-size:10px;color:var(--muted);flex:none}
  .skr-empty{font-size:12px;color:var(--muted)}
  #kpiTgtBody{padding:16px 18px}
  #kpiTgtBody .row-actions{justify-content:flex-end;border-top:1px solid var(--line);padding-top:12px;margin:14px 0 0}
  #kpiTgtBody .modal-field input[type=text],#kpiTgtBody .modal-field input[type=number],#kpiTgtBody .modal-field select{width:100%}
  #subkrBody textarea,#kpiTgtBody textarea,#modalBody textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:7px 9px;font-family:var(--mono);font-size:12px;box-sizing:border-box}
  /* quarter/week header */
  .qweek{display:flex;align-items:center;gap:12px;margin:0 0 14px;flex-wrap:wrap}
  .qw-label{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .qw-now{font-family:var(--mono);font-size:11px;color:var(--accent2);margin-left:auto}
  .qw-weeks{display:flex;gap:3px}
  .qw-cell{width:18px;height:7px;border-radius:2px;background:var(--panel2);border:1px solid var(--line)}
  .qw-cell.done{background:#24405e;border-color:#2a3a5a}
  .qw-cell.now{background:var(--accent);border-color:var(--accent)}
  .qw-track{flex:1;min-width:120px;height:7px;background:var(--panel2);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .qw-fill{height:100%;background:var(--accent)}
  /* metric mini-bar */
  .mc-bar{height:4px;background:var(--panel2);border-radius:3px;overflow:hidden;margin:9px 0 0}
  .mc-bar-fill{height:100%}
  /* signal bars */
  .bar-area{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin:0 0 18px}
  .bar-area-head{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .bar-area-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
  .sig-legend{display:flex;gap:12px;margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .sig-legend span{display:inline-flex;align-items:center;gap:4px}
  .sig-legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .sig-row{display:flex;align-items:center;gap:12px;margin:6px 0}
  .sig-lbl{font-size:12px;color:var(--ink);width:230px;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sig-track{flex:1;height:9px;background:var(--panel2);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .sig-fill{height:100%;border-radius:4px 0 0 4px}
  .sig-val{font-family:var(--mono);font-weight:700;font-size:13px;width:32px;text-align:right;flex:none}
</style>
</head>
<body>
<header>
  <h1><span class="dot">▣</span> R&amp;D Execution</h1>
  <span class="div-pill" id="divPill">—</span>
  <div class="spacer"></div>
  <select class="obj" id="objSelect"><option>loading…</option></select>
  <button class="act" id="saveBtn" style="margin-left:12px">Save</button>
  <button class="ghost" id="settingsBtn" style="margin-left:6px">⚙</button>
</header>
<main>
  <div class="msg" id="msg"></div>

  <div id="settingsPanel" style="display:none" class="settings">
    <h3>Broker &amp; division</h3>
    <p class="hint">Broker is baked in; token lives in this browser only. The division is taken from
      <code>?division=DIV-FC</code> (or pick below). An SSO embed can pass <code>?token=…</code>; it strips itself.</p>
    <label>Broker token <input class="mono" id="tokenInput" type="password" style="width:100%" placeholder="paste token"/></label>
    <label>Division <select id="divSelect"></select></label>
    <button class="act" id="tokenSave">Save</button>
  </div>

  <div id="objHeadWrap"></div>
  <div id="subKR" class="sub"></div>
  <div id="subSG" class="sub"></div>
  <div id="subTASK" class="sub"></div>
  <div id="initPanel" class="sub"></div>
</main>
<div id="modalOverlay" class="overlay"><div class="modal"><div class="modal-head"><span class="modal-title" id="modalTitle"></span><button class="modal-x" id="modalX" title="Close">×</button></div><div id="modalBody"></div></div></div>
<div id="subkrOverlay" class="overlay" style="z-index:120"><div class="modal" style="max-width:520px"><div class="modal-head"><span class="modal-title" id="subkrTitle"></span><button class="modal-x" id="subkrX" title="Close">×</button></div><div id="subkrBody"></div></div></div>
<div id="kpiTgtOverlay" class="overlay" style="z-index:130"><div class="modal" style="max-width:520px"><div class="modal-head"><span class="modal-title" id="kpiTgtTitle"></span><button class="modal-x" id="kpiTgtX" title="Close">×</button></div><div id="kpiTgtBody"></div></div></div>

<script>
/* ============================================================================
   Unified R&D Suite — Shared Core (frozen spec v1.3)
   Pure logic only. No DOM, no network. Runs headless in Node and injects into
   the browser shells via build.py (between the CORE markers).

   Conventions (spec v1.3)
   -----------------------
   - Dates are integer day-counts (days since an arbitrary epoch). Shells convert
     ISO <-> day-count; the core only does max / +lag arithmetic.
   - percentComplete is an integer 0..100.
   - A KPI is the measurement atom, hosted by exactly one Key Result or one
     stage-gate (kpi.hostType / kpi.hostId). A value enters ONLY via kpiUpdates
     (in an exec doc), keyed by kpiId; a KPI's current value = the latest update
     by timestamp.
   - Scoring rolls up: KPI score -> Key Result score (mean of its KPIs) ->
     Objective score (mean of its Key Results). Stage-gate KPIs are gating only
     and never feed the objective OKR score (spec v1.3 §A, decision #1).
   - Unscored: a KPI with a null target or no read yet is excluded from its KR's
     mean (g1). A KR with no scorable KPIs is unscored; an objective with no
     scorable KRs has no band, not zero. No synthesized KRs (decision #3).
   - For direction 'range', score is 100 inside [lo,hi] and falls off linearly to
     0 at one full band-width outside the band.
   ============================================================================ */

(function (root) {
  'use strict';

  // ---- small helpers --------------------------------------------------------
  function mean(arr) {
    if (!arr.length) return null;
    var s = 0;
    for (var i = 0; i < arr.length; i++) s += arr[i];
    return s / arr.length;
  }
  function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

  // ---- IDs ------------------------------------------------------------------
  // Type-prefixed, parent-scoped, monotonic counter. The counter is an
  // ALLOCATION number, never a position: reordering existing ids never changes
  // the next id. Display order lives in the separate `order` field.
  var ID_PREFIX = {
    division: 'DIV', initiative: 'INIT', milestone: 'MS', objective: 'OBJ',
    keyResult: 'KR', stageGate: 'SG', task: 'TSK', kpi: 'KPI', kpiGroup: 'KPG'
  };
  // Structural levels pad to 2 digits; leaf metrics use plain integers.
  var ID_PAD = { initiative: 2, milestone: 2, objective: 2 };

  function stemFromParent(type, parentId, opts) {
    if (type === 'division') return opts.code;                 // explicit short code, e.g. "FC"
    var parentStem = parentId.substring(parentId.indexOf('-') + 1); // "DIV-FC"->"FC", "INIT-FC-01"->"FC-01"
    if (type === 'objective') return parentStem + '-' + opts.quarter; // parent is the division
    return parentStem;
  }

  // allocId(type, parentId, existingIds, opts?)
  //   division:  opts.code required (parentId may be null)
  //   objective: opts.quarter required, parentId = division id
  //   others:    parentId = immediate logical parent (initiative / objective / host)
  function allocId(type, parentId, existingIds, opts) {
    opts = opts || {};
    var prefix = ID_PREFIX[type];
    if (!prefix) throw new Error('allocId: unknown type ' + type);
    var stem = stemFromParent(type, parentId, opts);
    if (type === 'division') {
      var did = prefix + '-' + stem;
      if (existingIds.indexOf(did) !== -1) throw new Error('allocId: duplicate division code ' + stem);
      return did;
    }
    var base = prefix + '-' + stem + '-';
    var max = 0;
    for (var i = 0; i < existingIds.length; i++) {
      var id = existingIds[i];
      if (id.indexOf(base) === 0) {
        var n = parseInt(id.slice(base.length), 10);

  // ---- KPI levels + typed-link resolution (Unified KPI Model) --------------

  // hierarchy for link-direction validation + default-type lookup ONLY; they do
  // NOT drive resolution. Resolution follows explicit typed parent links (see the
  // typed-link block below). Legacy groupId/isDefiner data is normalized on the
  // fly (linkOf) and scores identically.
  var KPI_LEVEL = { product: 5, component: 4, initiative: 3, keyResult: 2, stageGate: 1, task: 0 };
  var PORTFOLIO_KEY = '__portfolio__';   // reserved docs-map key: portfolio KPIs join resolution, skipped by structural iteration

  function progressLinear(value, target, direction) {

  // all readings posted to a kpi id, newest first
  function readingsFor(kpiId, execDocs){
    var out=[];

      for(var i=0;i<ups.length;i++) if(ups[i].kpiId===kpiId) out.push(ups[i]);
    }

  }

  function resolvedReadingValue(kpiId, defn, execDocs){
    var ups=readingsFor(kpiId, execDocs);

  // latest reading posted to a specific KPI id (the host where it was entered)

  }

  function allKpis(execDocs) {
    var out = [];

  }
  // ---- typed-link resolution (Unified KPI Model, Phase B) ------------------
  // Each KPI optionally points at ONE parent via linkParent + linkType
  // (direct|contribute|specification) + optional linkPriority; the tree IS the
  // group and its root (linkParent==null) owns identity + authors the target.
  //   direct        : child shows the parent's target exactly (no override); value flows up
  //   contribute    : child may override the target (else inherit); value flows up
  //   specification : child may override the target (else inherit); value does NOT flow up (firewall)
  // Legacy groupId/isDefiner is normalized on the fly by linkOf (definer/standalone
  // -> root, every member -> contribute-child of its definer), so existing data
  // resolves identically. Precedence among contributors to a parent (§7): the
  // node's OWN reading ranks above its children; among children direct outranks
  // contribute; then quarter (nulls last), then reading recency. linkPriority wins first.
  var LINK_OWN_RANK = 3;                    // a node's own directly-posted reading
  function relationRank(type){ return type==='direct'?2 : type==='contribute'?1 : 0; }
  function kpiById(id, kpis){ for(var i=0;i<kpis.length;i++) if(kpis[i].id===id) return kpis[i]; return null; }
  function legacyDefinerId(kpi, kpis){

  function linkOf(kpi, kpis){
    if(kpi.linkParent !== undefined) return { parent:kpi.linkParent, type:kpi.linkType||'contribute', priority:kpi.linkPriority||0 };
    if(!kpi.groupId || kpi.isDefiner) return { parent:null, type:'contribute', priority:0 };
    var def=legacyDefinerId(kpi, kpis); return { parent:(def===kpi.id?null:def), type:'contribute', priority:0 };
  }
  function rootOf(kpi, kpis){ var seen={}, cur=kpi;
    while(cur){ if(seen[cur.id]) return cur; seen[cur.id]=1; var lk=linkOf(cur,kpis);
      if(lk.parent==null) return cur; var p=kpiById(lk.parent,kpis); if(!p) return cur; cur=p; }
    return kpi; }
  function childrenOf(kpiId, kpis){ var out=[]; for(var i=0;i<kpis.length;i++) if(linkOf(kpis[i],kpis).parent===kpiId) out.push(kpis[i]); return out; }
  // group = every KPI sharing a root (retained name/semantics for shells)
  function groupMembers(kpi, kpis){ var r=rootOf(kpi,kpis), out=[]; for(var i=0;i<kpis.length;i++) if(rootOf(kpis[i],kpis)===r) out.push(kpis[i]); return out; }
  // identity lives on the root (a lone KPI is its own root)
  function definerOf(kpi, kpis){ return rootOf(kpi, kpis); }
  function kpiDirection(kpi, kpis){ return rootOf(kpi, kpis).direction; }
  function kpiUnit(kpi, kpis){ return rootOf(kpi, kpis).unit; }
  function kpiName(kpi, kpis){ return rootOf(kpi, kpis).name; }

  function objectiveQuarter(objId, execDocs){
    if(objId==null || !execDocs) return null; var pf=execDocs[PORTFOLIO_KEY]; if(!pf) return null;
    var objs=pf.objectives||[]; for(var i=0;i<objs.length;i++) if(objs[i].id===objId) return objs[i].quarter||null; return null;
  }
  function precKey(kpi, reading, rank, execDocs){
    return { priority:(kpi.linkPriority||0), rank:rank, quarter:objectiveQuarter(kpi.objectiveId, execDocs), ts:(reading?(reading.timestamp||0):0) };
  }
  function precCmp(x, y){                    // sort comparator: negative => x wins (ranks first)

    if(x.quarter!==y.quarter){ if(x.quarter==null) return 1; if(y.quarter==null) return -1; return x.quarter<y.quarter?1:-1; }

  function latestReadingObj(kpiId, execDocs){ var ups=readingsFor(kpiId, execDocs); return ups.length?ups[0]:null; }

  // effective TARGET — walk UP the parent chain (§6)
  function effectiveTarget(kpi, kpis, seen){

    root = root || rootOf(kpi, kpis);

    var ownV=resolvedReadingValue(kpi.id, root, execDocs);
    if(ownV!=null) pool.push({ value:ownV, key:precKey(kpi, latestReadingObj(kpi.id, execDocs), LINK_OWN_RANK, execDocs) });

  function effValue(kpi, kpis, execDocs){ return effectiveValue(kpi, kpis, execDocs); }

    if (currentValue == null) return null;

    } else {
      raw = progressLinear(currentValue, kpi.target, kpi.direction);
    }
    return clamp(raw, 0, 100);
  }

  }

  // find a KR object across exec docs

  // ---- objective & tier scores ---------------------------------------------
  function krsForObjective(objId, execDocs) {

  function objectivesInScope(entityType, entityId, portfolio) {

      case 'company':    return objs.slice();
      default: return [];
    }

  //   quarter given   -> QUARTERLY (objectives stamped that quarter)

  function score(entityType, entityId, portfolio, execDocs, quarter) {

    var scores = [];
    for (var i = 0; i < objs.length; i++) {

  function rollupObjective(id, portfolio, execDocs) { return score('objective', id, portfolio, execDocs); }
  function rollupInitiative(id, portfolio, execDocs) { return score('initiative', id, portfolio, execDocs); }
  function rollupDivision(id, portfolio, execDocs) { return score('division', id, portfolio, execDocs); }
  function rollupCompany(portfolio, execDocs) { return score('company', null, portfolio, execDocs); }

  function withPortfolio(portfolio, execDocs) {

    if (s >= 70) return 'at-risk';

  // ---- product / model classification (§5) ---------------------------------
  function ownClass(node) {
    if (node.modelId) return { kind: 'model', modelId: node.modelId };
    if (node.productId) return { kind: 'product', productId: node.productId };
    return { kind: 'agnostic' };

    return null;

    if (c.kind === 'product') return c.productId;
    return null;

    var c = effClass(obj, portfolio);
    return c.kind === 'model' ? c.modelId : null;
  }

  // validateClassification(obj, portfolio) -> {ok:true} | {ok:false, reason}
  // Enforces the node invariant (at most one of productId/modelId) and the
  // §5.3 no-broadening / same-branch rule relative to the objective's initiative.
  function validateClassification(obj, portfolio) {
    if (obj.productId && obj.modelId) return { ok: false, reason: 'objective sets both productId and modelId' };
    var init = initiativeOf(obj, portfolio);
    if (!init) return { ok: false, reason: 'objective has no initiative' };
    if (init.productId && init.modelId) return { ok: false, reason: 'initiative sets both productId and modelId' };

    var io = ownClass(init);
    var oo = ownClass(obj);
    if (oo.kind === 'agnostic') return { ok: true };           // inherits; always valid
    if (io.kind === 'agnostic') return { ok: true };           // anything allowed below agnostic

    if (io.kind === 'product') {
      if (oo.kind === 'product') {
        return oo.productId === io.productId
          ? { ok: true }
          : { ok: false, reason: 'objective pins a different product than its initiative' };
      }
      // oo is model -> must be under the initiative's product
      return parentProductOf(oo.modelId, portfolio) === io.productId
        ? { ok: true }
        : { ok: false, reason: 'objective model belongs to a different product than its initiative' };
    }

    if (io.kind === 'model') {
      // initiative is at the finest grain: objective must match exactly (no broaden)
      if (oo.kind === 'model' && oo.modelId === io.modelId) return { ok: true };
      return { ok: false, reason: 'initiative is model-specific; objective must match that model' };
    }
    return { ok: true };
  }

  // sliceScore(axis, id, portfolio, execDocs, quarter?) -> 0..100 or null
  function sliceScore(axis, id, portfolio, execDocs, quarter) {
    var objs = (portfolio.objectives || []).filter(function (o) {
      var match = axis === 'product' ? (effProduct(o, portfolio) === id)
                                     : (effModel(o, portfolio) === id);

      return true;

    for (var i = 0; i < objs.length; i++) {
      var s = objectiveScore(objs[i].id, execDocs);
      if (s != null) scores.push(s);
    }
    return mean(scores);
  }

  // ---- stage-gate state classifier (pure; baseline-aware) ------------------
  // passed-late compares the actual finish to the COMMITTED reference
  // (baselineDate if set, else plannedDate); overdue is about the current plan.
  function classifyGate(g, today) {
    if (!g) return 'pending';
    var ref = (g.baselineDate != null) ? g.baselineDate : g.plannedDate;
    if (g.actualDate != null) {
      return (ref != null && g.actualDate > ref) ? 'passed-late' : 'passed';
    }
    if (g.plannedDate != null && g.plannedDate < today) return 'overdue';
    return 'pending';
  }

  // ---- schedule cascade (§6) -----------------------------------------------
  // cascade(portfolio, execDocs, today) ->
  //   { objectiveProjectedEnd, milestoneEffective, initiativeProjectedEnd,
  //     longTermSlip, gateEffective, gateSlipped, cycles }
  function cascade(portfolio, execDocs, today) {
    var objs = portfolio.objectives || [];
    var inits = portfolio.initiatives || [];
    var miles = portfolio.milestones || [];
    var objById = {}; objs.forEach(function (o) { objById[o.id] = o; });
    var cycles = [];

    function execFor(divId) { return execDocs[divId] || {}; }
    function childrenOf(obj) {
      var ex = execFor(obj.divisionId);
      var sgs = (ex.stageGates || []).filter(function (s) { return s.objectiveId === obj.id; });
      var tasks = (ex.tasks || []).filter(function (t) { return t.objectiveId === obj.id; });
      return { sgs: sgs, tasks: tasks };
    }

    function pfTask(t) {
      if (t.actualEnd != null) return t.actualEnd;
      var started = (t.actualStart != null) || (t.percentComplete && t.percentComplete > 0);
      if (started) {
        var frac = clamp((t.percentComplete || 0) / 100, 0, 1);
        return Math.max(t.plannedEnd, today + Math.ceil((1 - frac) * (t.plannedEnd - t.plannedStart)));
      }
      return t.plannedEnd; // not started
    }
    // A stage-gate is a checkpoint: done -> actualDate; otherwise it cannot have
    // finished before now, so it projects to max(plannedDate, today).
    function pfGate(s) {
      if (s.actualDate != null) return s.actualDate;
      return Math.max(s.plannedDate, today);
    }

    // Stage 1a: gather children once; index every gate globally
    var childCache = {}, gateById = {}, gateObjOf = {};
    objs.forEach(function (o) {
      var c = childrenOf(o);
      childCache[o.id] = c;
      c.sgs.forEach(function (s) { gateById[s.id] = s; gateObjOf[s.id] = o; });
    });

    // gate predecessors: explicit stageGateEdges + opt-in per-objective date-chain.
    // Edges and the chain flag may live on the portfolio (cross-division) OR in an
    // execDoc (per-division, authored in the execution app). Both are merged here.
    // With none of them, a gate has no preds and gateEff == pfGate.
    var gatePreds = {};
    Object.keys(gateById).forEach(function (gid) { gatePreds[gid] = []; });
    function addGateEdge(e) { if (e && gatePreds[e.toGate]) gatePreds[e.toGate].push({ from: e.fromGate, lag: e.lagDays || 0 }); }
    (portfolio.stageGateEdges || []).forEach(addGateEdge);
    for (var dk in execDocs) {
      if (!execDocs.hasOwnProperty(dk) || dk === PORTFOLIO_KEY) continue;
      (execDocs[dk].stageGateEdges || []).forEach(addGateEdge);
    }
    objs.forEach(function (o) {
      var exChain = (execFor(o.divisionId).chainGatesByDate || {})[o.id];
      if (!o.chainGatesByDate && !exChain) return;
      var seq = childCache[o.id].sgs.filter(function (s) { return s.plannedDate != null; })
        .slice().sort(function (a, b) { return a.plannedDate - b.plannedDate; });
      for (var i = 1; i < seq.length; i++) {
        gatePreds[seq[i].id].push({ from: seq[i - 1].id, lag: 0 });
      }
    });

    // Stage 1b: gate->gate forward pass, seeded from pfGate (cycle-guarded, lagged).
    // A locked gate is exempt from INHERITED push (committed date holds), but it
    // still seeds its successors at pfGate. Lock never lets an overdue, undone gate
    // read as on-time: the seed still floors at today via pfGate.
    var gateEff = {}, gateStack = {};
    function computeGateEff(gid) {
      if (gateEff[gid] != null) return gateEff[gid];
      var g = gateById[gid];
      if (!g) return 0;
      var seed = pfGate(g);
      if (g.locked) { gateEff[gid] = seed; return seed; }
      if (gateStack[gid]) { cycles.push('GATE:' + gid); return seed; }
      gateStack[gid] = true;
      var res = seed, preds = gatePreds[gid];
      for (var i = 0; i < preds.length; i++) {
        if (gateStack[preds[i].from]) { cycles.push('GATE:' + preds[i].from); continue; }
        res = Math.max(res, computeGateEff(preds[i].from) + preds[i].lag);
      }
      gateStack[gid] = false;
      gateEff[gid] = res;
      return res;
    }
    Object.keys(gateById).forEach(function (gid) { computeGateEff(gid); });

    // baseline-aware slip per gate: slipped iff committed and now forecast past it.
    var gateSlipped = {};
    Object.keys(gateById).forEach(function (gid) {
      var g = gateById[gid];
      gateSlipped[gid] = (g.baselineDate != null) && (gateEff[gid] > g.baselineDate);
    });

    // Stage 1c: intrinsic projected end per objective (tasks + chained gate ends)
    var intrinsic = {};
    objs.forEach(function (o) {
      var c = childCache[o.id], vals = [];
      c.tasks.forEach(function (t) { vals.push(pfTask(t)); });
      c.sgs.forEach(function (s) { vals.push(gateEff[s.id]); });
      intrinsic[o.id] = vals.length ? Math.max.apply(null, vals) : o.plannedEnd;
    });

    // Stage 2: lateral OBJ->OBJ forward pass (topological, cycle-guarded)
    var objPreds = {}; objs.forEach(function (o) { objPreds[o.id] = []; });
    (portfolio.objectiveEdges || []).forEach(function (e) {
      if (objPreds[e.toObj]) objPreds[e.toObj].push({ from: e.fromObj, lag: e.lagDays || 0 });
    });
    var projEnd = {}, objStack = {};
    function computeProjEnd(id) {
      if (projEnd[id] != null) return projEnd[id];
      var o = objById[id];
      if (!o) return 0;
      if (objStack[id]) { cycles.push('OBJ:' + id); return intrinsic[id]; } // break cycle
      objStack[id] = true;
      var cs = o.plannedStart;
      var preds = objPreds[id];
      for (var i = 0; i < preds.length; i++) {
        if (objStack[preds[i].from]) { cycles.push('OBJ:' + preds[i].from); continue; }
        cs = Math.max(cs, computeProjEnd(preds[i].from) + preds[i].lag);
      }
      var dur = o.plannedEnd - o.plannedStart;
      var res = Math.max(intrinsic[id], cs + dur);
      objStack[id] = false;
      projEnd[id] = res;
      return res;
    }
    objs.forEach(function (o) { computeProjEnd(o.id); });

    // Stage 3: vertical lift into milestones
    var effective = {};
    miles.forEach(function (m) { effective[m.id] = m.plannedDate; });
    objs.forEach(function (o) {
      (o.milestoneIds || []).forEach(function (mid) {
        if (effective[mid] != null) effective[mid] = Math.max(effective[mid], projEnd[o.id]);
      });
    });

    // Stage 4: lateral MS->MS forward pass (topological, cycle-guarded)
    var msById = {}; miles.forEach(function (m) { msById[m.id] = m; });
    var msPreds = {}; miles.forEach(function (m) { msPreds[m.id] = []; });
    (portfolio.milestoneEdges || []).forEach(function (e) {
      if (msPreds[e.toMs]) msPreds[e.toMs].push({ from: e.fromMs, lag: e.lagDays || 0 });
    });
    var msDone = {}, msStack = {};
    function liftMilestone(id) {
      if (msDone[id]) return effective[id];
      if (!msById[id]) return effective[id] || 0;
      if (msStack[id]) { cycles.push('MS:' + id); return effective[id]; }
      msStack[id] = true;
      var preds = msPreds[id];
      for (var i = 0; i < preds.length; i++) {
        if (msStack[preds[i].from]) { cycles.push('MS:' + preds[i].from); continue; }
        effective[id] = Math.max(effective[id], liftMilestone(preds[i].from) + preds[i].lag);
      }
      msStack[id] = false;
      msDone[id] = true;
      return effective[id];
    }
    miles.forEach(function (m) { liftMilestone(m.id); });

    // Stage 5: initiative projected end + headline slip
    var initProjEnd = {}, slip = {};
    inits.forEach(function (I) {
      var vals = [I.plannedEnd];
      miles.forEach(function (m) { if (m.initiativeId === I.id) vals.push(effective[m.id]); });
      objs.forEach(function (o) {
        if (o.initiativeId === I.id && (!o.milestoneIds || o.milestoneIds.length === 0)) {
          vals.push(projEnd[o.id]);
        }
      });
      var pe = Math.max.apply(null, vals);
      initProjEnd[I.id] = pe;
      slip[I.id] = pe - I.plannedEnd;
    });

    return {
      objectiveProjectedEnd: projEnd,
      milestoneEffective: effective,
      initiativeProjectedEnd: initProjEnd,
      longTermSlip: slip,
      gateEffective: gateEff,
      gateSlipped: gateSlipped,
      cycles: cycles
    };
  }

  // ---- exports --------------------------------------------------------------
  var API = {
    allocId: allocId,
    kpiScore: kpiScore,
    kpiScoreResolved: kpiScoreResolved,
    kpiCurrentValue: kpiCurrentValue,
    kpisFor: kpisFor,
    groupMembers: groupMembers,
    definerOf: definerOf,
    kpiDirection: kpiDirection,
    kpiUnit: kpiUnit,
    kpiName: kpiName,
    effTarget: effTarget,
    effValue: effValue,
    linkOf: linkOf,
    rootOf: rootOf,
    childrenOf: childrenOf,
    effectiveTarget: effectiveTarget,
    effectiveValue: effectiveValue,
    migrateKpiLinks: migrateKpiLinks,
    KPI_LEVEL: KPI_LEVEL,
    computeStat: computeStat,
    scoreEmbeddedKpi: scoreEmbeddedKpi,
    subKrScore: subKrScore,
    keyResultScore: keyResultScore,
    stageGateScore: stageGateScore,
    krsForObjective: krsForObjective,
    objectiveScore: objectiveScore,
    score: score,
    boundsOf: boundsOf,
    band: band,
    rollupObjective: rollupObjective,
    rollupInitiative: rollupInitiative,
    rollupDivision: rollupDivision,
    rollupCompany: rollupCompany,
    withPortfolio: withPortfolio,
    PORTFOLIO_KEY: PORTFOLIO_KEY,
    ownClass: ownClass,
    effClass: effClass,
    effProduct: effProduct,
    effModel: effModel,
    validateClassification: validateClassification,
    sliceScore: sliceScore,
    cascade: cascade,
    classifyGate: classifyGate,
    // exposed for tests / shells
    _mean: mean, _clamp: clamp, _progressLinear: progressLinear, _progressRange: progressRange
  };

  if (typeof module !== 'undefined' && module.exports) module.exports = API;
  else root.RDCore = API;

})(typeof window !== 'undefined' ? window : this);

</script>
<script>
"use strict";
const RD = window.RDCore;

/* ---------------- broker (identical contract to planning app) ---------------- */
const BROKER = "https://web-production-b17a2.up.railway.app";
(function seedToken(){
  const u = new URL(location.href);
  const t = u.searchParams.get("token");
  if (t){ localStorage.setItem("rd_broker_token", t); u.searchParams.delete("token"); history.replaceState({}, "", u.toString()); }
})();
const tok = () => localStorage.getItem("rd_broker_token") || "";
const auth = () => { const t = tok(); return t ? { "Authorization":"Bearer "+t } : {}; };
async function apiVersion(id){ const r=await fetch(`${BROKER}/state/${id}/version`,{headers:auth()}); if(!r.ok) throw r; return r.json(); }
async function apiGet(id){ const r=await fetch(`${BROKER}/state/${id}`,{headers:auth()}); if(r.status===404) return null; if(!r.ok) throw r; return r.json(); }
async function apiPut(id,doc,etag){ const r=await fetch(`${BROKER}/state/${id}`,{method:"PUT",
  headers:{...auth(),"Content-Type":"application/json","If-Match":etag||"0"},body:JSON.stringify({doc})}); if(!r.ok) throw r; return r.json(); }

/* ---------------- date <-> day-count ---------------- */
const EPOCH = Date.UTC(2020,0,1);
const isoToDay = iso => iso ? Math.round((Date.parse(iso+"T00:00:00Z")-EPOCH)/86400000) : null;
const dayToIso = d => d==null ? "" : new Date(EPOCH+d*86400000).toISOString().slice(0,10);
const todayDay = () => Math.round((Date.now()-EPOCH)/86400000);

/* ---------------- state ---------------- */
let portfolio = null;            // read-only
let exec = blankExec();          // this division's doc (read-write)
let divisionId = null;
let execEtag = "0", execVersion = 0, portfolioVersion = 0;
let selectedObj = null;
let pollTimer = null;

function blankExec(){ return { objectiveState:[],keyResults:[],kpis:[],stageGates:[],tasks:[],kpiUpdates:[],stageGateEdges:[],chainGatesByDate:{} }; }
function execId(){ return "EXEC-"+divisionId; }
// docs map for core calls — includes the portfolio so KR/gate/task KPIs linked
// to a portfolio initiative KPI resolve cross-document (cascade ignores the key)
function emForCore(){ const m={}; if(divisionId) m[divisionId]=exec; return RD.withPortfolio(portfolio, m); }
// resolution pool: this division's KPIs + the portfolio's initiative-level definers
function allKpisPool(){ return (portfolio && portfolio.kpis && portfolio.kpis.length) ? exec.kpis.concat(portfolio.kpis) : exec.kpis; }

/* ---------------- messaging ---------------- */
function setMsg(t,k){ const el=document.getElementById("msg"); el.textContent=t; el.className="msg show "+(k||"info");
  if(k==="ok") setTimeout(()=>el.classList.remove("show"),2500); }

/* ---------------- division resolution ---------------- */
function resolveDivision(){
  const u = new URL(location.href);
  return u.searchParams.get("division") || localStorage.getItem("rd_division") || null;
}

/* ---------------- load / save ---------------- */
async function loadAll(){
  if(!tok()){ setMsg("Add a broker token in ⚙ to load. Showing empty scratch.", "info"); renderAll(); return; }
  try{
    const p = await apiGet("portfolio");
    if(!p){ setMsg("No portfolio doc on the broker yet — create it from the Planning app first.", "err"); return; }
    portfolio = p.doc; portfolioVersion = p.version;
    fillDivSelect();
    if(!divisionId){ divisionId = resolveDivision() || (portfolio.divisions[0] && portfolio.divisions[0].id); }
    if(!divisionId){ setMsg("No divisions exist yet.", "err"); return; }
    localStorage.setItem("rd_division", divisionId);
    document.getElementById("divPill").textContent = divName(divisionId)+" · "+divisionId;
    const ex = await apiGet(execId());
    exec = ex ? Object.assign(blankExec(), ex.doc) : blankExec();
    execEtag = ex ? ex.etag : "0"; execVersion = ex ? ex.version : 0;
    fillObjSelect();
    setMsg("Loaded "+divName(divisionId)+".", "ok");
    startPoll();
  }catch(e){ setMsg("Load failed ("+(e.status||e)+"). Check token in ⚙.", "err"); }
  renderAll();
}
async function saveExec(){
  if(!tok()){ setMsg("Add a broker token first.", "err"); return; }
  try{
    const res = await apiPut(execId(), exec, execEtag);
    execEtag = res.etag; execVersion = res.version;   // record own version -> next poll ignores echo
    setMsg("Saved.", "ok");
  }catch(e){
    if(e.status===412){ setMsg("Another editor saved first — reloading, then re-apply.", "err");
      const ex=await apiGet(execId()); if(ex){ exec=Object.assign(blankExec(),ex.doc); execEtag=ex.etag; execVersion=ex.version; renderAll(); } }
    else setMsg("Save failed ("+(e.status||e)+").", "err");
  }
}
function startPoll(){ if(pollTimer) return; pollTimer=setInterval(pollOnce,25000); }
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
async function pollOnce(){
  try{
    const pv = await apiVersion("portfolio");
    if(pv.version!==portfolioVersion){ const p=await apiGet("portfolio"); if(p){ portfolio=p.doc; portfolioVersion=p.version; fillObjSelect(); } }
    const ev = await apiVersion(execId());
    if(ev.version!==execVersion){ const ex=await apiGet(execId());
      if(ex){ exec=Object.assign(blankExec(),ex.doc); execEtag=ex.etag; execVersion=ex.version; renderAll();
        setMsg("Updated from another editor.", "info"); } }
  }catch(e){}
}

/* ---------------- lookups ---------------- */
function divName(id){ const d=(portfolio.divisions||[]).find(x=>x.id===id); return d?d.name:id; }
function myObjectives(){ return (portfolio.objectives||[]).filter(o=>o.divisionId===divisionId && o.layer!=="roadmap"); }
function fillDivSelect(){ const s=document.getElementById("divSelect");
  s.innerHTML=(portfolio.divisions||[]).map(d=>`<option value="${d.id}">${esc(d.name)} (${d.id})</option>`).join("");
  if(divisionId) s.value=divisionId;
  s.onchange=()=>{ divisionId=s.value; localStorage.setItem("rd_division",divisionId); selectedObj=null; loadAll(); }; }
function fillObjSelect(){
  const s=document.getElementById("objSelect"); const objs=myObjectives();
  s.innerHTML = objs.length ? objs.map(o=>`<option value="${o.id}">${esc((o.statement||o.id))} · ${o.quarter||'—'}</option>`).join("")
                            : `<option value="">no objectives for this division</option>`;
  if(objs.length){ if(!selectedObj || !objs.find(o=>o.id===selectedObj)) selectedObj=objs[0].id; s.value=selectedObj; }
  s.onchange=()=>{ selectedObj=s.value; renderAll(); };
}

/* ---------------- generic sub-entity editor ---------------- */
const SUB = {
  keyResult: { arr:()=>exec.keyResults, label:"Key result", idType:"keyResult",
    schema:[["statement","Statement","text"],["status","Status","text"]] },
  kpi:       { arr:()=>exec.kpis, label:"KPI", idType:"kpi",
    schema:[["name","Name","text"],["direction","Direction","dir"],["target","Target","target"],["unit","Unit","text"]] },
  stageGate: { arr:()=>exec.stageGates, label:"Stage-gate", idType:"stageGate",
    schema:[["name","Name","text"],["gate_id","Gate id (optional)","text"],["plannedDate","Planned date","date"],
            ["actualDate","Actual / passed date","date"],["status","Status","text"]] },
  task:      { arr:()=>exec.tasks, label:"Execution task", idType:"task",
    schema:[["name","Name","text"],["plannedStart","Planned start","date"],["plannedEnd","Planned end","date"],
            ["percentComplete","% complete","number"],["actualStart","Actual start","date"],["actualEnd","Actual end","date"]] },
};
// addingFor: null | {type, hostType?, hostId?}   editingSub: null | {type, id}
let addingFor = null, editingSub = null, armedDel = null;
let subReturn = null;  // when a KPI/link editor is launched from inside the gate modal, return here on close
function captureReturn(forType){ subReturn = ((forType==="kpi"||forType==="link") && editingSub && editingSub.type==="stageGate") ? {type:"stageGate", id:editingSub.id} : null; }
function restoreReturn(){ if(subReturn){ editingSub = subReturn; addingFor = null; subReturn = null; return true; } return false; }

function subOpenAdd(type, hostType, hostId){ captureReturn(type); addingFor = {type, hostType, hostId}; editingSub = null; armedDel = null; renderAll(); }
function subOpenEdit(type, id){ captureReturn(type); editingSub = {type, id}; addingFor = null; armedDel = null; renderAll(); }
function subCancel(){ addingFor = null; editingSub = null; draftKr = null; draftKrFor = null; closeSubKrModal(); closeTgtModal(); restoreReturn(); renderAll(); }

function renderSubEditor(type, rec){
  const cfg = SUB[type]; rec = rec || {};
  const editing = !!(editingSub && editingSub.type===type);
  let html = `<div class="ed">`;
  for(const [k,label,t] of cfg.schema){
    if(t==="dir"){
      html += `<label>${label}<select data-f="direction">`+
        ["up","down","range"].map(d=>`<option ${rec.direction===d?'selected':''}>${d}</option>`).join("")+`</select></label>`;
    } else if(t==="target"){
      const tgt = rec.target;
      html += `<label>Target (up/down)<input data-f="target" class="sm" type="number" value="${(tgt!=null&&typeof tgt!=='object')?tgt:''}"/></label>`;
      html += `<label>Range lo<input data-f="targetLo" class="tiny" type="number" value="${(tgt&&typeof tgt==='object')?tgt.lo:''}"/></label>`;
      html += `<label>Range hi<input data-f="targetHi" class="tiny" type="number" value="${(tgt&&typeof tgt==='object')?tgt.hi:''}"/></label>`;
    } else {
      const val = t==="date" ? dayToIso(rec[k]) : (rec[k]!=null?rec[k]:"");
      html += `<label>${label}<input data-f="${k}" type="${t==='date'?'date':t==='number'?'number':'text'}" value="${esc(String(val))}"/></label>`;
    }
  }
  html += `</div><div class="row-actions" style="margin:0 0 8px">
    <button class="act mini" data-save="1">${editing?'Update':'Add'}</button>
    <button class="ghost mini" data-cancel="1">Cancel</button></div>`;
  return html;
}
function readSubEditor(scope){
  const out={};
  scope.querySelectorAll("[data-f]").forEach(el=>{
    const k=el.dataset.f;
    if(el.type==="date") out[k]=isoToDay(el.value)||null;
    else if(el.type==="number") out[k]= el.value===""?null:Number(el.value);
    else out[k]= el.value===""?null:el.value;
  });
  // assemble range target
  if(out.direction==="range"){ out.target = (out.targetLo!=null&&out.targetHi!=null)?{lo:out.targetLo,hi:out.targetHi}:null; }
  else if(out.target===undefined){ /* keep */ }
  delete out.targetLo; delete out.targetHi;
  return out;
}
function saveSub(){
  const a = addingFor, e = editingSub;
  const type = a ? a.type : (e && e.type);
  if(!type) return;
  const scope = document.querySelector(".ed");
  if(!scope) return;
  const data = readSubEditor(scope);
  const arr = SUB[type].arr();
  if(e){
    const rec = arr.find(x=>x.id===e.id);
    if(type==="kpi" && isMemberKpi(rec)){ rec.target = (data.target===undefined ? null : data.target); } // override only
    else Object.assign(rec, data);
  } else {
    const initHost = (type==="kpi" && a.hostType==="initiative");
    const objScope = initHost ? null : selectedObj;
    const parent = initHost ? a.hostId : selectedObj;
    const id = RD.allocId(SUB[type].idType, parent, arr.map(x=>x.id));
    const base = { id, objectiveId:objScope };
    if(type==="kpi"){ base.hostType=a.hostType; base.hostId=a.hostId; base.groupId=null; base.isDefiner=true; }
    arr.push(Object.assign(base, data));
  }
  addingFor=null; editingSub=null; restoreReturn(); renderAll(); setMsg(SUB[type].label+" saved (Save to persist).", "ok");
}
function delSub(type, id){
  if(type==="kpi"){ const k=exec.kpis.find(x=>x.id===id);
    if(k && isDefinerWithLinks(k)){ setMsg("This KPI defines a linked metric — unlink its members first.","err"); return; } }
  if(armedDel!==id){ armedDel=id; renderAll(); return; }
  armedDel=null;
  if(type==="keyResult" || type==="stageGate"){
    const kids = exec.kpis.filter(k=>k.hostType===type && k.hostId===id).map(k=>k.id);
    exec.kpis = exec.kpis.filter(k=>!(k.hostType===type && k.hostId===id));
    exec.kpiUpdates = exec.kpiUpdates.filter(u=>kids.indexOf(u.kpiId)===-1);
    const arr=SUB[type].arr(); arr.splice(arr.findIndex(x=>x.id===id),1);
  } else if(type==="kpi"){
    exec.kpis.splice(exec.kpis.findIndex(x=>x.id===id),1);
    exec.kpiUpdates = exec.kpiUpdates.filter(u=>u.kpiId!==id);
  } else {
    const arr=SUB[type].arr(); arr.splice(arr.findIndex(x=>x.id===id),1);
  }
  renderAll(); setMsg("Deleted (Save to persist).","ok");
}
function postRead(host, kpiId){
  const inp = host.querySelector(`[data-read="${kpiId}"]`);
  if(!inp || inp.value===""){ setMsg("Enter a value to post.","err"); return; }
  exec.kpiUpdates.push({ id:"UPD-"+kpiId+"-"+Date.now(), kpiId, value:Number(inp.value), timestamp:Date.now(), note:"" });
  renderAll(); setMsg("Reading posted (Save to persist).","ok");
}

/* ---------------- render: objective header + sub-tables ---------------- */
function renderAll(){
  if(!portfolio){ document.getElementById("objHeadWrap").innerHTML='<p class="hint">Not loaded.</p>'; clearSubs(); return; }
  if(divisionId) renderInitPanel(); else document.getElementById("initPanel").innerHTML="";
  const objs = myObjectives();
  if(!objs.length || !selectedObj){ document.getElementById("objHeadWrap").innerHTML='<p class="hint">No objectives assigned to this division yet (create them in the Planning app).</p>'; ["KR","SG","TASK"].forEach(s=>document.getElementById("sub"+s).innerHTML=""); return; }
  const o = objs.find(x=>x.id===selectedObj);
  document.getElementById("objHeadWrap").innerHTML = quarterHeader(o) + objMetricStrip(o) + signalBars();
  renderKRs(); renderGates(); renderTasks(); renderModal();
}
function clearSubs(){ ["KR","SG","TASK"].forEach(s=>document.getElementById("sub"+s).innerHTML=""); document.getElementById("initPanel").innerHTML=""; }

const panelCollapsed = new Set(["INIT"]);  // initiative metrics start collapsed
function panelHead(key, title, cnt, actionsHtml){

function objMetricStrip(o){
  const em=emForCore(), td=todayDay();
  const sc=RD.objectiveScore(selectedObj, em), b=RD.band(sc);
  const krs=exec.keyResults.filter(r=>r.objectiveId===selectedObj);
  const krOn=krs.filter(k=>RD.band(RD.keyResultScore(k.id, em))==="on-track").length;
  const gates=exec.stageGates.filter(r=>r.objectiveId===selectedObj);
  const gSt=gates.map(g=>RD.classifyGate(g, td));
  const gPass=gSt.filter(s=>s==="passed"||s==="passed-late").length, gOver=gSt.filter(s=>s==="overdue").length;
  let projEnd=null, slip=null;
  try{ const casc=RD.cascade(portfolio, em, td); projEnd=casc.objectiveProjectedEnd[selectedObj];
    if(o.plannedEnd!=null && projEnd!=null) slip=projEnd-o.plannedEnd; }catch(e){}
  const tasks=exec.tasks.filter(r=>r.objectiveId===selectedObj);
  const tAvg=tasks.length?Math.round(tasks.reduce((a,t)=>a+(t.percentComplete||0),0)/tasks.length):null;
  const schedVal=projEnd!=null?dayToIso(projEnd):"—";
  const schedSub=slip==null?(o.plannedEnd==null?"no planned end":"—"):(slip>0?`+${slip}d slip`:"on plan");
  const schedColor=(slip!=null&&slip>0)?"var(--bad)":(slip===0?"var(--ok)":"var(--muted)");
  const scBar = sc==null?"":`<div class="mc-bar"><div class="mc-bar-fill" style="width:${Math.round(sc)}%;background:${col(b)}"></div></div>`;
  return `<div class="metrics">
    <div class="mc"><div class="mc-label">Objective score</div><div class="mc-val" style="color:${col(b)}">${sc==null?"—":Math.round(sc)}</div>${scBar}<div class="mc-sub"><span class="band ${b}">${b.replace("-"," ")}</span></div></div>
    <div class="mc"><div class="mc-label">Key results</div><div class="mc-val">${krs.length}</div><div class="mc-sub">${krOn} on track</div></div>
    <div class="mc"><div class="mc-label">Stage-gates</div><div class="mc-val">${gates.length}</div><div class="mc-sub">${gPass} passed · ${gOver} overdue</div></div>
    <div class="mc"><div class="mc-label">Schedule</div><div class="mc-val small" style="color:${schedColor}">${schedVal}</div><div class="mc-sub">${o.plannedEnd!=null?`planned ${dayToIso(o.plannedEnd)} · `:""}${schedSub}</div></div>
    <div class="mc"><div class="mc-label">Tasks</div><div class="mc-val">${tAvg==null?"—":tAvg+"%"}</div><div class="mc-sub">${tasks.length} task${tasks.length===1?"":"s"}</div></div>
  </div>`;
}

function parseQuarter(q){
  if(!q) return null;
  const m=String(q).match(/Q([1-4])\D*(\d{2,4})/i);
  if(!m) return null;
  let yr=+m[2]; if(yr<100) yr+=2000;
  const qn=+m[1];
  const start=Math.round((Date.UTC(yr,(qn-1)*3,1)-EPOCH)/86400000);
  return { qn, yr, start, label:"Q"+qn+" "+yr };
}
function quarterHeader(o){
  const title=`<div class="obj-title">${esc(o.statement||o.id)} <span class="pill mono">${o.id}</span></div>`;
  const td=todayDay();
  const q=parseQuarter(o.quarter);
  if(q){
    const wk=Math.max(1,Math.min(13,Math.floor((td-q.start)/7)+1));
    const inQ = td>=q.start && td<q.start+91;
    let cells="";
    for(let i=1;i<=13;i++) cells+=`<span class="qw-cell${i<wk?' done':''}${(i===wk&&inQ)?' now':''}"></span>`;
    const status = inQ?("Week "+wk+" of 13"):(td<q.start?"upcoming":"complete");
    return title+`<div class="qweek"><span class="qw-label">${q.label} · ${dayToIso(q.start)}–${dayToIso(q.start+90)}</span><div class="qw-weeks">${cells}</div><span class="qw-now">${status}</span></div>`;
  }
  if(o.plannedStart!=null && o.plannedEnd!=null){
    const span=Math.max(1,o.plannedEnd-o.plannedStart), elapsed=Math.max(0,Math.min(span,td-o.plannedStart));
    const pct=Math.round(elapsed/span*100);
    return title+`<div class="qweek"><span class="qw-label">${esc(o.quarter||"window")} · ${dayToIso(o.plannedStart)} → ${dayToIso(o.plannedEnd)}</span><div class="qw-track"><div class="qw-fill" style="width:${pct}%"></div></div><span class="qw-now">${pct}% elapsed</span></div>`;
  }
  return title + (o.quarter?`<div class="qweek"><span class="qw-label">${esc(o.quarter)}</span></div>`:"");
}
function signalBars(){
  const em=emForCore();
  const krs=exec.keyResults.filter(r=>r.objectiveId===selectedObj);
  if(!krs.length) return "";
  let rows="";
  krs.forEach((kr,idx)=>{
    const s=RD.keyResultScore(kr.id, em), b=RD.band(s), w=s==null?0:Math.round(s);
    rows+=`<div class="sig-row"><span class="sig-lbl" title="${esc(kr.statement||kr.id)}">KR${idx+1} · ${esc(kr.statement||kr.id)}</span><div class="sig-track"><div class="sig-fill" style="width:${w}%;background:${col(b)}"></div></div><span class="sig-val" style="color:${col(b)}">${s==null?"—":Math.round(s)}</span></div>`;
  });
  const legend=`<div class="sig-legend"><span><i style="background:var(--ok)"></i>on track</span><span><i style="background:var(--warn)"></i>at risk</span><span><i style="background:var(--bad)"></i>off track</span><span><i style="background:var(--none)"></i>no data</span></div>`;
  return `<div class="bar-area"><div class="bar-area-head"><span class="bar-area-title">Key-result signal</span>${legend}</div>${rows}</div>`;
}

  // KR modal (custom, draft-backed) takes priority and self-manages its DOM

    }

  }
  draftKr=null; draftKrFor=null;

function clampPct(v){ v=Number(v); return isNaN(v)?0:Math.max(0,Math.min(100,v)); }

function segHtml(opts,cur,attr){ return `<div class="seg">`+opts.map(o=>`<button type="button" class="seg-btn${cur===o[0]?" on":""}" data-${attr}="${o[0]}">${o[1]}</button>`).join("")+`</div>`; }
function krPrimaryKpi(krId){ return exec.kpis.find(k=>k.hostType==="keyResult" && k.hostId===krId) || null; }
function initDraftKr(kr){
  const isNew=!kr, pk=isNew?null:krPrimaryKpi(kr.id);
  return {
    id:isNew?null:kr.id,
    statement:isNew?"":(kr.statement||""),

    kpiReadCount:(pk&&pk.readCount!=null)?pk.readCount:"",

function draftSubKrListHtml(){
  const subs=draftKr.subKrs;
  if(!subs.length) return `<div class="skr-empty">none yet — add a weighted sub-result</div>`;
  return subs.map((s,i)=>{
    let meta, measured="";
    if((s.trackingType||"percentage")==="percentage"){ meta=(Number(s.progress)||0)+"%"; }
    else { const k=(s.kpis&&s.kpis[0])||{}; const tp=k.targetType||k.type||"demo";
      meta = (tp==="binary") ? "binary" : tp+((k.target!=null&&k.target!=="")?(" "+(k.direction==="down"?"≤":"≥")+" "+esc(String(k.target))+(k.unit?" "+esc(k.unit):"")):"");
      if(tp==="binary"){ measured = (k.current!=null) ? ` · ${Number(k.current)>=1?"met":"not met"}` : ` · unmeasured`; }
      else if(k.current!=null){ const sc=RD.scoreEmbeddedKpi(k); measured=` · now ${esc(String(k.current))}${k.unit?" "+esc(k.unit):""}`+(sc!=null?` (${Math.round(sc)}%)`:""); }
      else measured=` · unmeasured`; }
    return `<div class="skr-row"><span class="skr-name" data-editsubkr="${i}" title="edit">${esc(s.name||("Sub-KR "+(i+1)))}</span><span class="skr-meta">w ${s.weight||1} · ${meta}${measured}</span><button class="ghost mini danger" type="button" data-delsubkr="${i}">del</button></div>`;
  }).join("");
}

function wireKrModal(){
  const body=document.getElementById("modalBody");
  body.querySelectorAll("[data-f]").forEach(el=>el.oninput=()=>{ draftKr[el.dataset.f]=el.value; });
  const sl=body.querySelector("[data-pctslider]"), pv=body.querySelector("[data-pctval]");
  if(sl&&pv) sl.oninput=()=>{ draftKr.progress=sl.value; pv.textContent=sl.value+"%"; };
  const tsel=body.querySelector("[data-krtype]");
  if(tsel) tsel.onchange=()=>{ draftKr.trackingType=tsel.value; krRerenderBody(); };
  body.querySelectorAll("[data-krktype]").forEach(b=>b.onclick=()=>{ draftKr.kpiType=b.dataset.krktype; krRerenderBody(); });
  body.querySelectorAll("[data-krkdir]").forEach(b=>b.onclick=()=>{ draftKr.kpiDir=b.dataset.krkdir; body.querySelectorAll("[data-krkdir]").forEach(x=>x.classList.remove("on")); b.classList.add("on"); });
  const add=body.querySelector("[data-addsubkr]"); if(add) add.onclick=()=>openSubKrModal(null);
  body.querySelectorAll("[data-editsubkr]").forEach(el=>el.onclick=()=>openSubKrModal(Number(el.dataset.editsubkr)));
  body.querySelectorAll("[data-delsubkr]").forEach(el=>el.onclick=()=>{ draftKr.subKrs.splice(Number(el.dataset.delsubkr),1); refreshKrSubList(); });
  const sv=body.querySelector("[data-krsave]"); if(sv) sv.onclick=saveKrModal;
  const cx=body.querySelector("[data-krcancel]"); if(cx) cx.onclick=subCancel;
}
function saveKrModal(){
  const body=document.getElementById("modalBody");
  body.querySelectorAll("[data-f]").forEach(el=>{ draftKr[el.dataset.f]=el.value; });
  const d=draftKr;
  if(!String(d.statement||"").trim()){ setMsg("Key result needs a statement.","err"); const s=body.querySelector('[data-f="statement"]'); if(s) s.focus(); return; }
  let kr = d.id ? exec.keyResults.find(x=>x.id===d.id) : null;
  if(!kr){ const id=RD.allocId("keyResult", selectedObj, exec.keyResults.map(x=>x.id)); kr={ id, objectiveId:selectedObj }; exec.keyResults.push(kr); }
  kr.statement=String(d.statement).trim();
  kr.trackingType=d.trackingType;
  if(d.trackingType==="percentage"){ kr.progress=clampPct(d.progress); delete kr.subKrs; }
  else if(d.trackingType==="subkr"){ kr.subKrs=d.subKrs; delete kr.progress; }
  else { delete kr.progress; delete kr.subKrs; }
  if(d.trackingType==="kpi"){
    let pk=krPrimaryKpi(kr.id);
    if(!pk){ const id=RD.allocId("kpi", selectedObj, exec.kpis.map(x=>x.id)); pk={ id, objectiveId:selectedObj, hostType:"keyResult", hostId:kr.id, groupId:null, isDefiner:true }; exec.kpis.push(pk); }
    pk.name=kr.statement;
    pk.targetType=d.kpiType;
    if(d.kpiType==="binary"){ pk.direction=null; pk.target=null; pk.unit=null; delete pk.statistic; delete pk.readCount; }
    else {
      pk.direction=(d.kpiDir==="decrease")?"down":"up";
      pk.target=parseTargetNum(d.kpiTarget);
      pk.unit=d.kpiUnit||null;
      if(d.kpiType==="statistical"){ pk.statistic=d.kpiStatistic||"average"; pk.readCount=(d.kpiReadCount===""||d.kpiReadCount==null)?"":Number(d.kpiReadCount); }
      else { delete pk.statistic; delete pk.readCount; }
    }
  }
  draftKr=null; draftKrFor=null; addingFor=null; editingSub=null;
  renderAll(); setMsg("Key result saved (Save to persist).","ok");
}

function wireSubKrModal(){
  const body=document.getElementById("subkrBody");
  body.querySelectorAll("[data-sf]").forEach(el=>el.oninput=()=>{ draftSubKr[el.dataset.sf]=el.value; });
  const sl=body.querySelector("[data-spctslider]"), pv=body.querySelector("[data-spctval]");
  if(sl&&pv) sl.oninput=()=>{ draftSubKr.progress=sl.value; pv.textContent=sl.value+"%"; };
  const refreshStat=()=>{ const p=body.querySelector("[data-statpreview]"); if(p) p.textContent=statPreview(draftSubKr); };
  const rd=body.querySelector('[data-sf="readings"]'); if(rd) rd.oninput=()=>{ draftSubKr.readings=rd.value; refreshStat(); };
  const st=body.querySelector('[data-sf="statistic"]'); if(st) st.oninput=()=>{ draftSubKr.statistic=st.value; refreshStat(); };
  body.querySelectorAll("[data-skrmet]").forEach(b=>b.onclick=()=>{ draftSubKr.metFlag=b.dataset.skrmet; body.querySelectorAll("[data-skrmet]").forEach(x=>x.classList.remove("on")); b.classList.add("on"); });
  body.querySelectorAll("[data-skrtype]").forEach(b=>b.onclick=()=>{ draftSubKr.trackingType=b.dataset.skrtype; document.getElementById("subkrBody").innerHTML=subKrModalBody(); wireSubKrModal(); });
  body.querySelectorAll("[data-skrdir]").forEach(b=>b.onclick=()=>{ draftSubKr.dir=b.dataset.skrdir; body.querySelectorAll("[data-skrdir]").forEach(x=>x.classList.remove("on")); b.classList.add("on"); });
  const sv=body.querySelector("[data-subkrsave]"); if(sv) sv.onclick=saveSubKrModal;
  const cx=body.querySelector("[data-subkrcancel]"); if(cx) cx.onclick=closeSubKrModal;
}
function saveSubKrModal(){
  const body=document.getElementById("subkrBody");
  body.querySelectorAll("[data-sf]").forEach(el=>{ draftSubKr[el.dataset.sf]=el.value; });
  const d=draftSubKr;
  if(!String(d.name||"").trim()){ const n=body.querySelector('[data-sf="name"]'); if(n) n.focus(); return; }
  const w=parseFloat(d.weight)||1, nm=String(d.name).trim();
  let skr;
  if(d.trackingType==="percentage"){ skr={ name:nm, weight:w, trackingType:"percentage", progress:clampPct(d.progress), kpis:[] }; }
  else {
    const k={ type:d.trackingType, targetType:d.trackingType, name:nm, current:null };
    if(d.trackingType==="binary"){
      k.current = (d.metFlag===""||d.metFlag==null) ? null : Number(d.metFlag);
    } else {
      k.direction=(d.dir==="decrease")?"down":"up"; k.target=parseTargetNum(d.target); k.unit=d.unit||null;
      if(d.trackingType==="statistical"){
        k.statistic=d.statistic||"average"; k.readCount=(d.readCount===""||d.readCount==null)?"":Number(d.readCount);
        k.readings=String(d.readings||"").trim();
        const nums=parseNums(d.readings);
        k.current = nums.length ? RD.computeStat(k.statistic, nums) : null;
      } else { /* demonstration */
        k.current = parseTargetNum(d.current);
      }
    }
    skr={ name:nm, weight:w, trackingType:"kpi", progress:0, kpis:[k] };
  }
  if(draftSubKrIdx!=null) draftKr.subKrs[draftSubKrIdx]=skr; else draftKr.subKrs.push(skr);
  closeSubKrModal(); refreshKrSubList();
}

/* ---------------- KPI link groups (v1.3.1) ---------------- */
const LEVEL = { initiative:3, keyResult:2, stageGate:1, task:0 };
function objById(id){ return (portfolio.objectives||[]).find(o=>o.id===id); }
function initiativeIdOf(objId){ const o=objById(objId); return o?o.initiativeId:null; }
function divInitiatives(){ return (portfolio.initiatives||[]).filter(i=>i.divisionId===divisionId); }
function initName(id){ const i=(portfolio.initiatives||[]).find(x=>x.id===id); return i?(i.name||i.id):id; }
function krName(id){ const r=exec.keyResults.find(x=>x.id===id); return r?(r.statement||r.id):id; }
function gateName(id){ const g=exec.stageGates.find(x=>x.id===id); return g?(g.name||g.id):id; }
function taskName(id){ const t=exec.tasks.find(x=>x.id===id); return t?(t.name||t.id):id; }
function hostLabel(k){
  if(k.hostType==="initiative") return "init: "+esc(initName(k.hostId));
  if(k.hostType==="keyResult")  return "KR: "+esc(krName(k.hostId));
  if(k.hostType==="stageGate")  return "gate: "+esc(gateName(k.hostId));
  return "task: "+esc(taskName(k.hostId));
}
function groupOf(k){ return k.groupId||k.id; }
function groupMemberCount(g){ return exec.kpis.filter(k=>groupOf(k)===g).length; }
function isMemberKpi(k){ return !!k.groupId && !k.isDefiner; }
function isDefinerWithLinks(k){ return !!k.groupId && k.isDefiner && groupMemberCount(k.groupId)>1; }
function groupIdsInUse(){ return exec.kpis.map(k=>k.groupId).filter(Boolean); }
function fmtTarget(t, unit){ if(t==null) return '—'; const v=(typeof t==='object')?`${t.lo}–${t.hi}`:t; return v+(unit?` ${esc(unit)}`:''); }

function linkCandidates(hostType, hostId){
  const O = hostType==="initiative" ? null : selectedObj;
  const initId = O ? initiativeIdOf(O) : null;
  const here = LEVEL[hostType];
  const pool = allKpisPool();
  const occupied = new Set(exec.kpis.filter(k=>LEVEL[k.hostType]===here && k.objectiveId===O).map(groupOf));
  const seen=new Set(), out=[];
  pool.forEach(k=>{
    const inScope = (k.objectiveId===O) || (k.hostType==="initiative" && k.hostId===initId);
    if(!inScope) return;
    const g=groupOf(k);
    if(seen.has(g) || occupied.has(g)) return;
    seen.add(g); out.push(RD.definerOf(k, pool));
  });
  return out;
}
function makeLinkMember(hostType, hostId, definerId){
  const pool = allKpisPool();
  const def = pool.find(k=>k.id===definerId); if(!def) return;
  const portfolioDef = exec.kpis.indexOf(def) < 0;   // definer lives in the portfolio doc (read-only here)
  let g = def.groupId;
  if(!g){
    if(portfolioDef){ g = def.id; }                  // use its effGroup; never mutate the portfolio from exec
    else { g = RD.allocId("kpiGroup", divisionId, groupIdsInUse()); def.groupId=g; def.isDefiner=true; }
  }
  const objScope = hostType==="initiative" ? null : selectedObj;
  const id = RD.allocId("kpi", objScope || hostId, exec.kpis.map(x=>x.id));
  exec.kpis.push({ id, objectiveId:objScope, hostType, hostId, groupId:g, isDefiner:false,
                   name:null, direction:null, unit:null, target:null, order:0 });
  addingFor=null; restoreReturn(); renderAll(); setMsg("Linked (Save to persist).","ok");
}
function unlinkKpi(id){
  const m = exec.kpis.find(k=>k.id===id); if(!m) return;
  const pool = allKpisPool();
  m.name = RD.kpiName(m, pool); m.direction = RD.kpiDirection(m, pool); m.unit = RD.kpiUnit(m, pool);
  if(m.target==null) m.target = RD.effTarget(m, pool);
  m.groupId = null; m.isDefiner = true;
  renderAll(); setMsg("Unlinked (Save to persist).","ok");
}
function renderLinkEditor(hostType, hostId){
  const cands = linkCandidates(hostType, hostId);
  if(!cands.length) return `<div class="ed"><p class="hint" style="margin:0;grid-column:1/-1">No linkable metric in scope — define a KPI here, or one at the initiative level, first.</p></div>
    <div class="row-actions" style="margin:0 0 8px"><button class="ghost mini" data-cancel="1">Cancel</button></div>`;
  return `<div class="ed"><label style="grid-column:1/-1">Link to existing metric (define-down target, status-up value)
    <select data-linkdef>`+cands.map(d=>`<option value="${d.id}">${esc(RD.kpiName(d, allKpisPool())||d.id)} · ${hostLabel(d)}</option>`).join("")+
    `</select></label></div><div class="row-actions" style="margin:0 0 8px">
    <button class="act mini" data-savelink="${hostType}:${hostId}">Link</button>
    <button class="ghost mini" data-cancel="1">Cancel</button></div>`;
}
function renderKpiOverrideEditor(rec){
  const pool = allKpisPool();
  const dir = RD.kpiDirection(rec, pool), unit = RD.kpiUnit(rec, pool);
  const inhT = RD.effTarget(rec, pool), own = rec.target;
  let tEd;
  if(dir==="range"){
    tEd = `<label>Override lo<input data-f="targetLo" class="tiny" type="number" value="${(own&&typeof own==='object')?own.lo:''}"/></label>
           <label>Override hi<input data-f="targetHi" class="tiny" type="number" value="${(own&&typeof own==='object')?own.hi:''}"/></label>
           <input type="hidden" data-f="direction" value="range"/>`;
  } else {
    tEd = `<label>Override target (blank = inherit)<input data-f="target" class="sm" type="number" value="${(own!=null&&typeof own!=='object')?own:''}"/></label>`;
  }
  return `<div class="ed">
    <div class="inherited">inherits <b>${esc(RD.kpiName(rec,pool)||'')}</b> · dir <b>${dir||''}</b> · unit <b>${esc(unit||'—')}</b> · from <b>${hostLabel(RD.definerOf(rec,pool))}</b><br/>inherited target <b>${fmtTarget(inhT,unit)}</b> — a higher level can override; blank here = inherit</div>
    ${tEd}</div><div class="row-actions" style="margin:0 0 8px">
    <button class="act mini" data-save="1">Save override</button>
    <button class="ghost mini" data-cancel="1">Cancel</button></div>`;
