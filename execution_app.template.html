<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>R&D Execution — Division</title>
<style>
  :root{
    --bg:#0f1620; --panel:#15202d; --panel2:#1b2937; --line:#26384a;
    --ink:#e6edf3; --muted:#8aa0b4; --accent:#3fd0c9; --accent2:#7ca8ff;
    --ok:#34d399; --warn:#fbbf24; --bad:#f87171; --none:#5b7186;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.02em}
  header h1 .dot{color:var(--accent)}
  header .div-pill{font-family:var(--mono);font-size:12px;background:var(--panel2);border:1px solid var(--line);padding:3px 9px;border-radius:6px;color:var(--accent)}
  .spacer{flex:1}
  main{padding:18px;max-width:1080px;margin:0 auto}
  .msg{padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:13px;display:none}
  .msg.show{display:block}
  .msg.info{background:#13314a;color:#add4ff;border:1px solid #1d4a6e}
  .msg.err{background:#3a1620;color:#ffb4bd;border:1px solid #5e2230}
  .msg.ok{background:#13311f;color:#9ff0c4;border:1px solid #1d5e3a}
  select.obj{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 10px;border-radius:8px;font-size:14px;min-width:340px}
  .objhead{display:flex;align-items:center;gap:16px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin:14px 0}
  .objhead .sc{font-size:40px;font-weight:800;line-height:1}
  .objhead .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}
  .band{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .band.on-track{background:#10371f;color:var(--ok)} .band.at-risk{background:#3a2f10;color:var(--warn)}
  .band.off-track{background:#3a1414;color:var(--bad)} .band.no-band{background:#1c2733;color:var(--none)}
  .sub{margin:18px 0}
  .sub h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px;display:flex;align-items:center;gap:10px}
  .sub h3 button{margin-left:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .mono{font-family:var(--mono);font-size:12px}
  input,select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:6px 8px;border-radius:6px;font-family:var(--sans);font-size:13px}
  input.mono{font-family:var(--mono)}
  input.tiny{width:70px} input.sm{width:120px}
  button.act{background:var(--accent);color:#08121a;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}
  button.ghost{background:none;border:1px solid var(--line);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
  button.danger{color:var(--bad);border-color:#5e2230}
  button.danger.armed{background:var(--bad);color:#1a0a0c}
  button.mini{padding:3px 8px;font-size:12px}
  .row-actions{display:flex;gap:6px;align-items:center}
  .ed{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin:10px 0}
  .ed label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--muted)}
  .hint{color:var(--muted);font-size:12px;margin:8px 0}
  .pill{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .kpi-now{font-family:var(--mono);font-size:12px}
  .read-row{display:flex;gap:6px;align-items:center}
  code{font-family:var(--mono);background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
  .settings label{display:block;margin-bottom:10px;max-width:520px}
  .scwrap{display:flex;align-items:baseline;gap:10px}
  .hostcard{border:1px solid var(--line);border-radius:10px;margin:10px 0;overflow:hidden;background:var(--panel)}
  .hosthead{display:flex;align-items:center;gap:12px;padding:9px 14px;background:var(--panel2);border-bottom:1px solid var(--line)}
  .hosthead .hn{font-weight:600}
  .hosthead .hs{font-family:var(--mono);font-weight:700;font-size:15px}
  .hosthead .ha{margin-left:auto;display:flex;gap:6px;align-items:center}
  .hosthead .gate-meta{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center}
  table.kpitable{margin:0}
  table.kpitable td,table.kpitable th{padding:6px 14px}
  table.kpitable tbody tr:last-child td{border-bottom:none}
  .linkbadge{font-family:var(--mono);font-size:10px;color:var(--accent2);background:#16233e;border:1px solid #2a3a5a;border-radius:5px;padding:1px 5px;margin-left:4px;white-space:nowrap}
  .inherited{grid-column:1/-1;font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:7px 9px;line-height:1.6}
  .gate-sched{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--line);background:var(--panel);font-size:12px}
  .gate-sched .lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .gate-sched .sched-sep{color:var(--line)}
  .dep-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--accent2);background:#16233e;border:1px solid #2a3a5a;border-radius:5px;padding:2px 6px}
  .dep-chip button{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:13px;line-height:1;padding:0}
  .dep-chip button:hover{color:var(--bad)}
  .committed-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--warn);background:#3a2f10;border:1px solid #5a4a18;border-radius:5px;padding:2px 7px}
  select.edgepick{font-size:12px;padding:4px 6px;min-width:130px}
  input.laginp{width:56px}
  .chain-toggle{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;text-transform:none;letter-spacing:0}
  .chain-toggle input{width:auto;padding:0;margin:0}
  /* dashboard layout (tracker QT pattern, dark theme) */
  .obj-title{font-size:14px;color:var(--ink);margin:14px 0 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin:0 0 18px}
  .mc{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 15px}
  .mc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono);margin-bottom:8px}
  .mc-val{font-size:23px;font-weight:600;line-height:1;color:var(--ink)}
  .mc-val.small{font-size:14px;font-family:var(--mono)}
  .mc-sub{font-size:11px;color:var(--muted);margin-top:7px;font-family:var(--mono)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin:14px 0}
  .panel-header{display:flex;align-items:center;gap:10px;padding-bottom:9px;margin-bottom:10px;border-bottom:1px solid var(--line)}
  .panel-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .panel-title .chev{font-size:9px;transition:transform .15s;display:inline-block;color:var(--none)}
  .panel-title.collapsed .chev{transform:rotate(-90deg)}
  .panel-title .cnt{font-family:var(--mono);font-size:10px;color:var(--none);font-weight:400}
  .panel-header .ha{margin-left:auto;display:flex;gap:8px;align-items:center}
  .item-list{display:flex;flex-direction:column;gap:8px}
  .item-list.collapsed{display:none}
  .icard{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel2)}
  .icard-top{display:flex;align-items:center;gap:10px;padding:8px 12px}
  .icard-num{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent2);background:#16233e;border:1px solid #2a3a5a;border-radius:6px;padding:2px 7px;flex:none;cursor:pointer}
  .icard-title{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .icard-title.click{cursor:pointer}
  .icard-title.click:hover{color:var(--accent)}
  .icard-score{font-family:var(--mono);font-weight:700;font-size:15px;flex:none}
  .icard-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex:none}
  .icard-actions .gate-meta{font-family:var(--mono);font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .icard-meta{border-top:1px solid var(--line);background:var(--panel)}
  .statepill{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-radius:5px;padding:2px 7px;flex:none}
  .statepill.passed{background:#10371f;color:var(--ok)}
  .statepill.passed-late{background:#3a2f10;color:var(--warn)}
  .statepill.overdue{background:#3a1414;color:var(--bad)}
  .statepill.pending{background:#1c2733;color:var(--none)}
  /* modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-start;justify-content:center;padding:48px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .overlay .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:600px;box-shadow:0 16px 48px rgba(0,0,0,.5);margin:auto;overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .modal-title{font-size:14px;font-weight:600;color:var(--ink);flex:1}
  .modal-x{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
  .modal-x:hover{color:var(--ink)}
  #modalBody{padding:16px 18px}
  #modalBody .ed{margin:0 0 14px}
  #modalBody .row-actions{justify-content:flex-end;border-top:1px solid var(--line);padding-top:12px;margin:14px 0 0 !important}
  .modal-section-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:var(--mono);margin:14px 0 8px;display:block}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg-btn{background:var(--panel2);border:none;border-right:1px solid var(--line);color:var(--muted);padding:6px 13px;font-size:12px;cursor:pointer}
  .seg-btn:last-child{border-right:none}
  .seg-btn:hover{color:var(--ink)}
  .seg-btn.seg-pending{background:#1c2733;color:var(--ink)}
  .seg-btn.seg-active{background:#16233e;color:var(--accent2)}
  .seg-btn.seg-hit{background:#10371f;color:var(--ok)}
  .seg-btn.seg-missed{background:#3a1414;color:var(--bad)}
  /* quarter/week header */
  .qweek{display:flex;align-items:center;gap:12px;margin:0 0 14px;flex-wrap:wrap}
  .qw-label{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .qw-now{font-family:var(--mono);font-size:11px;color:var(--accent2);margin-left:auto}
  .qw-weeks{display:flex;gap:3px}
  .qw-cell{width:18px;height:7px;border-radius:2px;background:var(--panel2);border:1px solid var(--line)}
  .qw-cell.done{background:#24405e;border-color:#2a3a5a}
  .qw-cell.now{background:var(--accent);border-color:var(--accent)}
  .qw-track{flex:1;min-width:120px;height:7px;background:var(--panel2);border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .qw-fill{height:100%;background:var(--accent)}
  /* metric mini-bar */
  .mc-bar{height:4px;background:var(--panel2);border-radius:3px;overflow:hidden;margin:9px 0 0}
  .mc-bar-fill{height:100%}
  /* signal bars */
  .bar-area{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin:0 0 18px}
  .bar-area-head{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .bar-area-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
  .sig-legend{display:flex;gap:12px;margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .sig-legend span{display:inline-flex;align-items:center;gap:4px}
  .sig-legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .sig-row{display:flex;align-items:center;gap:12px;margin:6px 0}
  .sig-lbl{font-size:12px;color:var(--ink);width:230px;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sig-track{flex:1;height:9px;background:var(--panel2);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .sig-fill{height:100%;border-radius:4px 0 0 4px}
  .sig-val{font-family:var(--mono);font-weight:700;font-size:13px;width:32px;text-align:right;flex:none}
</style>
</head>
<body>
<header>
  <h1><span class="dot">▣</span> R&amp;D Execution</h1>
  <span class="div-pill" id="divPill">—</span>
  <div class="spacer"></div>
  <select class="obj" id="objSelect"><option>loading…</option></select>
  <button class="act" id="saveBtn" style="margin-left:12px">Save</button>
  <button class="ghost" id="settingsBtn" style="margin-left:6px">⚙</button>
</header>
<main>
  <div class="msg" id="msg"></div>

  <div id="settingsPanel" style="display:none" class="settings">
    <h3>Broker &amp; division</h3>
    <p class="hint">Broker is baked in; token lives in this browser only. The division is taken from
      <code>?division=DIV-FC</code> (or pick below). An SSO embed can pass <code>?token=…</code>; it strips itself.</p>
    <label>Broker token <input class="mono" id="tokenInput" type="password" style="width:100%" placeholder="paste token"/></label>
    <label>Division <select id="divSelect"></select></label>
    <button class="act" id="tokenSave">Save</button>
  </div>

  <div id="objHeadWrap"></div>
  <div id="subKR" class="sub"></div>
  <div id="subSG" class="sub"></div>
  <div id="subTASK" class="sub"></div>
  <div id="initPanel" class="sub"></div>
</main>
<div id="modalOverlay" class="overlay"><div class="modal"><div class="modal-head"><span class="modal-title" id="modalTitle"></span><button class="modal-x" id="modalX" title="Close">×</button></div><div id="modalBody"></div></div></div>

<script>/*__CORE__*/</script>
<script>
"use strict";
const RD = window.RDCore;

/* ---------------- broker (identical contract to planning app) ---------------- */
const BROKER = "https://web-production-b17a2.up.railway.app";
(function seedToken(){
  const u = new URL(location.href);
  const t = u.searchParams.get("token");
  if (t){ localStorage.setItem("rd_broker_token", t); u.searchParams.delete("token"); history.replaceState({}, "", u.toString()); }
})();
const tok = () => localStorage.getItem("rd_broker_token") || "";
const auth = () => { const t = tok(); return t ? { "Authorization":"Bearer "+t } : {}; };
async function apiVersion(id){ const r=await fetch(`${BROKER}/state/${id}/version`,{headers:auth()}); if(!r.ok) throw r; return r.json(); }
async function apiGet(id){ const r=await fetch(`${BROKER}/state/${id}`,{headers:auth()}); if(r.status===404) return null; if(!r.ok) throw r; return r.json(); }
async function apiPut(id,doc,etag){ const r=await fetch(`${BROKER}/state/${id}`,{method:"PUT",
  headers:{...auth(),"Content-Type":"application/json","If-Match":etag||"0"},body:JSON.stringify({doc})}); if(!r.ok) throw r; return r.json(); }

/* ---------------- date <-> day-count ---------------- */
const EPOCH = Date.UTC(2020,0,1);
const isoToDay = iso => iso ? Math.round((Date.parse(iso+"T00:00:00Z")-EPOCH)/86400000) : null;
const dayToIso = d => d==null ? "" : new Date(EPOCH+d*86400000).toISOString().slice(0,10);
const todayDay = () => Math.round((Date.now()-EPOCH)/86400000);

/* ---------------- state ---------------- */
let portfolio = null;            // read-only
let exec = blankExec();          // this division's doc (read-write)
let divisionId = null;
let execEtag = "0", execVersion = 0, portfolioVersion = 0;
let selectedObj = null;
let pollTimer = null;

function blankExec(){ return { objectiveState:[],keyResults:[],kpis:[],stageGates:[],tasks:[],kpiUpdates:[],stageGateEdges:[],chainGatesByDate:{} }; }
function execId(){ return "EXEC-"+divisionId; }
function emForCore(){ const m={}; if(divisionId) m[divisionId]=exec; return m; }

/* ---------------- messaging ---------------- */
function setMsg(t,k){ const el=document.getElementById("msg"); el.textContent=t; el.className="msg show "+(k||"info");
  if(k==="ok") setTimeout(()=>el.classList.remove("show"),2500); }

/* ---------------- division resolution ---------------- */
function resolveDivision(){
  const u = new URL(location.href);
  return u.searchParams.get("division") || localStorage.getItem("rd_division") || null;
}

/* ---------------- load / save ---------------- */
async function loadAll(){
  if(!tok()){ setMsg("Add a broker token in ⚙ to load. Showing empty scratch.", "info"); renderAll(); return; }
  try{
    const p = await apiGet("portfolio");
    if(!p){ setMsg("No portfolio doc on the broker yet — create it from the Planning app first.", "err"); return; }
    portfolio = p.doc; portfolioVersion = p.version;
    fillDivSelect();
    if(!divisionId){ divisionId = resolveDivision() || (portfolio.divisions[0] && portfolio.divisions[0].id); }
    if(!divisionId){ setMsg("No divisions exist yet.", "err"); return; }
    localStorage.setItem("rd_division", divisionId);
    document.getElementById("divPill").textContent = divName(divisionId)+" · "+divisionId;
    const ex = await apiGet(execId());
    exec = ex ? Object.assign(blankExec(), ex.doc) : blankExec();
    execEtag = ex ? ex.etag : "0"; execVersion = ex ? ex.version : 0;
    fillObjSelect();
    setMsg("Loaded "+divName(divisionId)+".", "ok");
    startPoll();
  }catch(e){ setMsg("Load failed ("+(e.status||e)+"). Check token in ⚙.", "err"); }
  renderAll();
}
async function saveExec(){
  if(!tok()){ setMsg("Add a broker token first.", "err"); return; }
  try{
    const res = await apiPut(execId(), exec, execEtag);
    execEtag = res.etag; execVersion = res.version;   // record own version -> next poll ignores echo
    setMsg("Saved.", "ok");
  }catch(e){
    if(e.status===412){ setMsg("Another editor saved first — reloading, then re-apply.", "err");
      const ex=await apiGet(execId()); if(ex){ exec=Object.assign(blankExec(),ex.doc); execEtag=ex.etag; execVersion=ex.version; renderAll(); } }
    else setMsg("Save failed ("+(e.status||e)+").", "err");
  }
}
function startPoll(){ if(pollTimer) return; pollTimer=setInterval(pollOnce,25000); }
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
async function pollOnce(){
  try{
    const pv = await apiVersion("portfolio");
    if(pv.version!==portfolioVersion){ const p=await apiGet("portfolio"); if(p){ portfolio=p.doc; portfolioVersion=p.version; fillObjSelect(); } }
    const ev = await apiVersion(execId());
    if(ev.version!==execVersion){ const ex=await apiGet(execId());
      if(ex){ exec=Object.assign(blankExec(),ex.doc); execEtag=ex.etag; execVersion=ex.version; renderAll();
        setMsg("Updated from another editor.", "info"); } }
  }catch(e){}
}

/* ---------------- lookups ---------------- */
function divName(id){ const d=(portfolio.divisions||[]).find(x=>x.id===id); return d?d.name:id; }
function myObjectives(){ return (portfolio.objectives||[]).filter(o=>o.divisionId===divisionId && o.layer!=="roadmap"); }
function fillDivSelect(){ const s=document.getElementById("divSelect");
  s.innerHTML=(portfolio.divisions||[]).map(d=>`<option value="${d.id}">${esc(d.name)} (${d.id})</option>`).join("");
  if(divisionId) s.value=divisionId;
  s.onchange=()=>{ divisionId=s.value; localStorage.setItem("rd_division",divisionId); selectedObj=null; loadAll(); }; }
function fillObjSelect(){
  const s=document.getElementById("objSelect"); const objs=myObjectives();
  s.innerHTML = objs.length ? objs.map(o=>`<option value="${o.id}">${esc((o.statement||o.id))} · ${o.quarter||'—'}</option>`).join("")
                            : `<option value="">no objectives for this division</option>`;
  if(objs.length){ if(!selectedObj || !objs.find(o=>o.id===selectedObj)) selectedObj=objs[0].id; s.value=selectedObj; }
  s.onchange=()=>{ selectedObj=s.value; renderAll(); };
}

/* ---------------- generic sub-entity editor ---------------- */
const SUB = {
  keyResult: { arr:()=>exec.keyResults, label:"Key result", idType:"keyResult",
    schema:[["statement","Statement","text"],["status","Status","text"]] },
  kpi:       { arr:()=>exec.kpis, label:"KPI", idType:"kpi",
    schema:[["name","Name","text"],["direction","Direction","dir"],["target","Target","target"],["unit","Unit","text"]] },
  stageGate: { arr:()=>exec.stageGates, label:"Stage-gate", idType:"stageGate",
    schema:[["name","Name","text"],["gate_id","Gate id (optional)","text"],["plannedDate","Planned date","date"],
            ["actualDate","Actual / passed date","date"],["status","Status","text"]] },
  task:      { arr:()=>exec.tasks, label:"Execution task", idType:"task",
    schema:[["name","Name","text"],["plannedStart","Planned start","date"],["plannedEnd","Planned end","date"],
            ["percentComplete","% complete","number"],["actualStart","Actual start","date"],["actualEnd","Actual end","date"]] },
};
// addingFor: null | {type, hostType?, hostId?}   editingSub: null | {type, id}
let addingFor = null, editingSub = null, armedDel = null;

function subOpenAdd(type, hostType, hostId){ addingFor = {type, hostType, hostId}; editingSub = null; armedDel = null; renderAll(); }
function subOpenEdit(type, id){ editingSub = {type, id}; addingFor = null; armedDel = null; renderAll(); }
function subCancel(){ addingFor = null; editingSub = null; renderAll(); }

function renderSubEditor(type, rec){
  const cfg = SUB[type]; rec = rec || {};
  const editing = !!(editingSub && editingSub.type===type);
  let html = `<div class="ed">`;
  for(const [k,label,t] of cfg.schema){
    if(t==="dir"){
      html += `<label>${label}<select data-f="direction">`+
        ["up","down","range"].map(d=>`<option ${rec.direction===d?'selected':''}>${d}</option>`).join("")+`</select></label>`;
    } else if(t==="target"){
      const tgt = rec.target;
      html += `<label>Target (up/down)<input data-f="target" class="sm" type="number" value="${(tgt!=null&&typeof tgt!=='object')?tgt:''}"/></label>`;
      html += `<label>Range lo<input data-f="targetLo" class="tiny" type="number" value="${(tgt&&typeof tgt==='object')?tgt.lo:''}"/></label>`;
      html += `<label>Range hi<input data-f="targetHi" class="tiny" type="number" value="${(tgt&&typeof tgt==='object')?tgt.hi:''}"/></label>`;
    } else {
      const val = t==="date" ? dayToIso(rec[k]) : (rec[k]!=null?rec[k]:"");
      html += `<label>${label}<input data-f="${k}" type="${t==='date'?'date':t==='number'?'number':'text'}" value="${esc(String(val))}"/></label>`;
    }
  }
  html += `</div><div class="row-actions" style="margin:0 0 8px">
    <button class="act mini" data-save="1">${editing?'Update':'Add'}</button>
    <button class="ghost mini" data-cancel="1">Cancel</button></div>`;
  return html;
}
function readSubEditor(scope){
  const out={};
  scope.querySelectorAll("[data-f]").forEach(el=>{
    const k=el.dataset.f;
    if(el.type==="date") out[k]=isoToDay(el.value)||null;
    else if(el.type==="number") out[k]= el.value===""?null:Number(el.value);
    else out[k]= el.value===""?null:el.value;
  });
  // assemble range target
  if(out.direction==="range"){ out.target = (out.targetLo!=null&&out.targetHi!=null)?{lo:out.targetLo,hi:out.targetHi}:null; }
  else if(out.target===undefined){ /* keep */ }
  delete out.targetLo; delete out.targetHi;
  return out;
}
function saveSub(){
  const a = addingFor, e = editingSub;
  const type = a ? a.type : (e && e.type);
  if(!type) return;
  const scope = document.querySelector(".ed");
  if(!scope) return;
  const data = readSubEditor(scope);
  const arr = SUB[type].arr();
  if(e){
    const rec = arr.find(x=>x.id===e.id);
    if(type==="kpi" && isMemberKpi(rec)){ rec.target = (data.target===undefined ? null : data.target); } // override only
    else Object.assign(rec, data);
  } else {
    const initHost = (type==="kpi" && a.hostType==="initiative");
    const objScope = initHost ? null : selectedObj;
    const parent = initHost ? a.hostId : selectedObj;
    const id = RD.allocId(SUB[type].idType, parent, arr.map(x=>x.id));
    const base = { id, objectiveId:objScope };
    if(type==="kpi"){ base.hostType=a.hostType; base.hostId=a.hostId; base.groupId=null; base.isDefiner=true; }
    arr.push(Object.assign(base, data));
  }
  addingFor=null; editingSub=null; renderAll(); setMsg(SUB[type].label+" saved (Save to persist).", "ok");
}
function delSub(type, id){
  if(type==="kpi"){ const k=exec.kpis.find(x=>x.id===id);
    if(k && isDefinerWithLinks(k)){ setMsg("This KPI defines a linked metric — unlink its members first.","err"); return; } }
  if(armedDel!==id){ armedDel=id; renderAll(); return; }
  armedDel=null;
  if(type==="keyResult" || type==="stageGate"){
    const kids = exec.kpis.filter(k=>k.hostType===type && k.hostId===id).map(k=>k.id);
    exec.kpis = exec.kpis.filter(k=>!(k.hostType===type && k.hostId===id));
    exec.kpiUpdates = exec.kpiUpdates.filter(u=>kids.indexOf(u.kpiId)===-1);
    const arr=SUB[type].arr(); arr.splice(arr.findIndex(x=>x.id===id),1);
  } else if(type==="kpi"){
    exec.kpis.splice(exec.kpis.findIndex(x=>x.id===id),1);
    exec.kpiUpdates = exec.kpiUpdates.filter(u=>u.kpiId!==id);
  } else {
    const arr=SUB[type].arr(); arr.splice(arr.findIndex(x=>x.id===id),1);
  }
  renderAll(); setMsg("Deleted (Save to persist).","ok");
}
function postRead(host, kpiId){
  const inp = host.querySelector(`[data-read="${kpiId}"]`);
  if(!inp || inp.value===""){ setMsg("Enter a value to post.","err"); return; }
  exec.kpiUpdates.push({ id:"UPD-"+kpiId+"-"+Date.now(), kpiId, value:Number(inp.value), timestamp:Date.now(), note:"" });
  renderAll(); setMsg("Reading posted (Save to persist).","ok");
}

/* ---------------- dashboard shell (panels + metric strip) ---------------- */
const panelCollapsed = new Set(["INIT"]);  // initiative metrics start collapsed
function panelHead(key, title, cnt, actionsHtml){
  const open = !panelCollapsed.has(key);
  return `<div class="panel-header"><span class="panel-title${open?'':' collapsed'}" data-panel="${key}"><span class="chev">▼</span>${esc(title)}${cnt!=null?` <span class="cnt">${cnt}</span>`:''}</span><span class="ha">${actionsHtml||''}</span></div>`;
}
function listOpen(key){ return panelCollapsed.has(key)?" collapsed":""; }
function objMetricStrip(o){
  const em=emForCore(), td=todayDay();
  const sc=RD.objectiveScore(selectedObj, em), b=RD.band(sc);
  const krs=exec.keyResults.filter(r=>r.objectiveId===selectedObj);
  const krOn=krs.filter(k=>RD.band(RD.keyResultScore(k.id, em))==="on-track").length;
  const gates=exec.stageGates.filter(r=>r.objectiveId===selectedObj);
  const gSt=gates.map(g=>RD.classifyGate(g, td));
  const gPass=gSt.filter(s=>s==="passed"||s==="passed-late").length, gOver=gSt.filter(s=>s==="overdue").length;
  let projEnd=null, slip=null;
  try{ const casc=RD.cascade(portfolio, em, td); projEnd=casc.objectiveProjectedEnd[selectedObj];
    if(o.plannedEnd!=null && projEnd!=null) slip=projEnd-o.plannedEnd; }catch(e){}
  const tasks=exec.tasks.filter(r=>r.objectiveId===selectedObj);
  const tAvg=tasks.length?Math.round(tasks.reduce((a,t)=>a+(t.percentComplete||0),0)/tasks.length):null;
  const schedVal=projEnd!=null?dayToIso(projEnd):"—";
  const schedSub=slip==null?(o.plannedEnd==null?"no planned end":"—"):(slip>0?`+${slip}d slip`:"on plan");
  const schedColor=(slip!=null&&slip>0)?"var(--bad)":(slip===0?"var(--ok)":"var(--muted)");
  const scBar = sc==null?"":`<div class="mc-bar"><div class="mc-bar-fill" style="width:${Math.round(sc)}%;background:${col(b)}"></div></div>`;
  return `<div class="metrics">
    <div class="mc"><div class="mc-label">Objective score</div><div class="mc-val" style="color:${col(b)}">${sc==null?"—":Math.round(sc)}</div>${scBar}<div class="mc-sub"><span class="band ${b}">${b.replace("-"," ")}</span></div></div>
    <div class="mc"><div class="mc-label">Key results</div><div class="mc-val">${krs.length}</div><div class="mc-sub">${krOn} on track</div></div>
    <div class="mc"><div class="mc-label">Stage-gates</div><div class="mc-val">${gates.length}</div><div class="mc-sub">${gPass} passed · ${gOver} overdue</div></div>
    <div class="mc"><div class="mc-label">Schedule</div><div class="mc-val small" style="color:${schedColor}">${schedVal}</div><div class="mc-sub">${o.plannedEnd!=null?`planned ${dayToIso(o.plannedEnd)} · `:""}${schedSub}</div></div>
    <div class="mc"><div class="mc-label">Tasks</div><div class="mc-val">${tAvg==null?"—":tAvg+"%"}</div><div class="mc-sub">${tasks.length} task${tasks.length===1?"":"s"}</div></div>
  </div>`;
}

function parseQuarter(q){
  if(!q) return null;
  const m=String(q).match(/Q([1-4])\D*(\d{2,4})/i);
  if(!m) return null;
  let yr=+m[2]; if(yr<100) yr+=2000;
  const qn=+m[1];
  const start=Math.round((Date.UTC(yr,(qn-1)*3,1)-EPOCH)/86400000);
  return { qn, yr, start, label:"Q"+qn+" "+yr };
}
function quarterHeader(o){
  const title=`<div class="obj-title">${esc(o.statement||o.id)} <span class="pill mono">${o.id}</span></div>`;
  const td=todayDay();
  const q=parseQuarter(o.quarter);
  if(q){
    const wk=Math.max(1,Math.min(13,Math.floor((td-q.start)/7)+1));
    const inQ = td>=q.start && td<q.start+91;
    let cells="";
    for(let i=1;i<=13;i++) cells+=`<span class="qw-cell${i<wk?' done':''}${(i===wk&&inQ)?' now':''}"></span>`;
    const status = inQ?("Week "+wk+" of 13"):(td<q.start?"upcoming":"complete");
    return title+`<div class="qweek"><span class="qw-label">${q.label} · ${dayToIso(q.start)}–${dayToIso(q.start+90)}</span><div class="qw-weeks">${cells}</div><span class="qw-now">${status}</span></div>`;
  }
  if(o.plannedStart!=null && o.plannedEnd!=null){
    const span=Math.max(1,o.plannedEnd-o.plannedStart), elapsed=Math.max(0,Math.min(span,td-o.plannedStart));
    const pct=Math.round(elapsed/span*100);
    return title+`<div class="qweek"><span class="qw-label">${esc(o.quarter||"window")} · ${dayToIso(o.plannedStart)} → ${dayToIso(o.plannedEnd)}</span><div class="qw-track"><div class="qw-fill" style="width:${pct}%"></div></div><span class="qw-now">${pct}% elapsed</span></div>`;
  }
  return title + (o.quarter?`<div class="qweek"><span class="qw-label">${esc(o.quarter)}</span></div>`:"");
}
function signalBars(){
  const em=emForCore();
  const krs=exec.keyResults.filter(r=>r.objectiveId===selectedObj);
  if(!krs.length) return "";
  let rows="";
  krs.forEach((kr,idx)=>{
    const s=RD.keyResultScore(kr.id, em), b=RD.band(s), w=s==null?0:Math.round(s);
    rows+=`<div class="sig-row"><span class="sig-lbl" title="${esc(kr.statement||kr.id)}">KR${idx+1} · ${esc(kr.statement||kr.id)}</span><div class="sig-track"><div class="sig-fill" style="width:${w}%;background:${col(b)}"></div></div><span class="sig-val" style="color:${col(b)}">${s==null?"—":Math.round(s)}</span></div>`;
  });
  const legend=`<div class="sig-legend"><span><i style="background:var(--ok)"></i>on track</span><span><i style="background:var(--warn)"></i>at risk</span><span><i style="background:var(--bad)"></i>off track</span><span><i style="background:var(--none)"></i>no data</span></div>`;
  return `<div class="bar-area"><div class="bar-area-head"><span class="bar-area-title">Key-result signal</span>${legend}</div>${rows}</div>`;
}

function wireModalBody(body){

  if(seg){

// the modal is a pure view of addingFor / editingSub — rendered at the end of renderAll
function renderModal(){
  let title=null, body=null;
  if(editingSub){
    const id = editingSub.id;
    if(editingSub.type==="stageGate"){ const g=exec.stageGates.find(x=>x.id===id); if(g){ title="Edit stage-gate"; body=gateModalBody(g); } }
    else if(editingSub.type==="keyResult"){ const r=exec.keyResults.find(x=>x.id===id); if(r){ title="Edit key result"; body=renderSubEditor("keyResult", r); } }
    else if(editingSub.type==="task"){ const r=exec.tasks.find(x=>x.id===id); if(r){ title="Edit task"; body=renderSubEditor("task", r); } }
    else if(editingSub.type==="kpi"){ const k=exec.kpis.find(x=>x.id===id); if(k){ title=isMemberKpi(k)?"Override KPI target":"Edit KPI"; body=isMemberKpi(k)?renderKpiOverrideEditor(k):renderSubEditor("kpi", k); } }
  } else if(addingFor){
    if(addingFor.type==="keyResult"){ title="Add key result"; body=renderSubEditor("keyResult", {}); }
    else if(addingFor.type==="stageGate"){ title="Add stage-gate"; body=gateModalBody(null); }
    else if(addingFor.type==="task"){ title="Add execution task"; body=renderSubEditor("task", {}); }
    else if(addingFor.type==="kpi"){ title="Add KPI"; body=renderSubEditor("kpi", {}); }
    else if(addingFor.type==="link"){ title="Link a metric"; body=renderLinkEditor(addingFor.hostType, addingFor.hostId); }
  }
  if(body==null){ closeModal(); return; }
  openModal(title, body);
}
function gateModalBody(g){

  const statuses=[["pending","Pending"],["active","In progress"],["hit","Passed"],["missed","Failed"]];
  const cur = g.status || (g.actualDate!=null?"hit":"pending");
  const segBtns = statuses.map(function(p){ return `<button type="button" class="seg-btn${cur===p[0]?' seg-'+p[0]:''}" data-gstatus="${p[0]}">${p[1]}</button>`; }).join("");

/* ---------------- KPI link groups (v1.3.1) ---------------- */
const LEVEL = { initiative:3, keyResult:2, stageGate:1, task:0 };
function objById(id){ return (portfolio.objectives||[]).find(o=>o.id===id); }
function initiativeIdOf(objId){ const o=objById(objId); return o?o.initiativeId:null; }
function divInitiatives(){ return (portfolio.initiatives||[]).filter(i=>i.divisionId===divisionId); }
function initName(id){ const i=(portfolio.initiatives||[]).find(x=>x.id===id); return i?(i.name||i.id):id; }
function krName(id){ const r=exec.keyResults.find(x=>x.id===id); return r?(r.statement||r.id):id; }
function gateName(id){ const g=exec.stageGates.find(x=>x.id===id); return g?(g.name||g.id):id; }
function taskName(id){ const t=exec.tasks.find(x=>x.id===id); return t?(t.name||t.id):id; }
function hostLabel(k){
  if(k.hostType==="initiative") return "init: "+esc(initName(k.hostId));
  if(k.hostType==="keyResult")  return "KR: "+esc(krName(k.hostId));
  if(k.hostType==="stageGate")  return "gate: "+esc(gateName(k.hostId));
  return "task: "+esc(taskName(k.hostId));
}
function groupOf(k){ return k.groupId||k.id; }
function groupMemberCount(g){ return exec.kpis.filter(k=>groupOf(k)===g).length; }
function isMemberKpi(k){ return !!k.groupId && !k.isDefiner; }
function isDefinerWithLinks(k){ return !!k.groupId && k.isDefiner && groupMemberCount(k.groupId)>1; }
function groupIdsInUse(){ return exec.kpis.map(k=>k.groupId).filter(Boolean); }
function fmtTarget(t, unit){ if(t==null) return '—'; const v=(typeof t==='object')?`${t.lo}–${t.hi}`:t; return v+(unit?` ${esc(unit)}`:''); }

function linkCandidates(hostType, hostId){
  const O = hostType==="initiative" ? null : selectedObj;
  const initId = O ? initiativeIdOf(O) : null;
  const here = LEVEL[hostType];
  const occupied = new Set(exec.kpis.filter(k=>LEVEL[k.hostType]===here && k.objectiveId===O).map(groupOf));
  const seen=new Set(), out=[];
  exec.kpis.forEach(k=>{
    const inScope = (k.objectiveId===O) || (k.hostType==="initiative" && k.hostId===initId);
    if(!inScope) return;
    const g=groupOf(k);
    if(seen.has(g) || occupied.has(g)) return;
    seen.add(g); out.push(RD.definerOf(k, exec.kpis));
  });
  return out;
}
function makeLinkMember(hostType, hostId, definerId){
  const def = exec.kpis.find(k=>k.id===definerId); if(!def) return;
  let g = def.groupId;
  if(!g){ g = RD.allocId("kpiGroup", divisionId, groupIdsInUse()); def.groupId=g; def.isDefiner=true; }
  const objScope = hostType==="initiative" ? null : selectedObj;
  const id = RD.allocId("kpi", objScope || hostId, exec.kpis.map(x=>x.id));
  exec.kpis.push({ id, objectiveId:objScope, hostType, hostId, groupId:g, isDefiner:false,
                   name:null, direction:null, unit:null, target:null, order:0 });
  addingFor=null; renderAll(); setMsg("Linked (Save to persist).","ok");
}
function unlinkKpi(id){
  const m = exec.kpis.find(k=>k.id===id); if(!m) return;
  m.name = RD.kpiName(m, exec.kpis); m.direction = RD.kpiDirection(m, exec.kpis); m.unit = RD.kpiUnit(m, exec.kpis);
  if(m.target==null) m.target = RD.effTarget(m, exec.kpis);
  m.groupId = null; m.isDefiner = true;
  renderAll(); setMsg("Unlinked (Save to persist).","ok");
}
function renderLinkEditor(hostType, hostId){
  const cands = linkCandidates(hostType, hostId);
  if(!cands.length) return `<div class="ed"><p class="hint" style="margin:0;grid-column:1/-1">No linkable metric in scope — define a KPI here, or one at the initiative level, first.</p></div>
    <div class="row-actions" style="margin:0 0 8px"><button class="ghost mini" data-cancel="1">Cancel</button></div>`;
  return `<div class="ed"><label style="grid-column:1/-1">Link to existing metric (define-down target, status-up value)
    <select data-linkdef>`+cands.map(d=>`<option value="${d.id}">${esc(RD.kpiName(d, exec.kpis)||d.id)} · ${hostLabel(d)}</option>`).join("")+
    `</select></label></div><div class="row-actions" style="margin:0 0 8px">
    <button class="act mini" data-savelink="${hostType}:${hostId}">Link</button>
    <button class="ghost mini" data-cancel="1">Cancel</button></div>`;
}
function renderKpiOverrideEditor(rec){
  const dir = RD.kpiDirection(rec, exec.kpis), unit = RD.kpiUnit(rec, exec.kpis);
  const inhT = RD.effTarget(rec, exec.kpis), own = rec.target;
  let tEd;
  if(dir==="range"){
    tEd = `<label>Override lo<input data-f="targetLo" class="tiny" type="number" value="${(own&&typeof own==='object')?own.lo:''}"/></label>
           <label>Override hi<input data-f="targetHi" class="tiny" type="number" value="${(own&&typeof own==='object')?own.hi:''}"/></label>
           <input type="hidden" data-f="direction" value="range"/>`;
  } else {
    tEd = `<label>Override target (blank = inherit)<input data-f="target" class="sm" type="number" value="${(own!=null&&typeof own!=='object')?own:''}"/></label>`;
  }
  return `<div class="ed">
    <div class="inherited">inherits <b>${esc(RD.kpiName(rec,exec.kpis)||'')}</b> · dir <b>${dir||''}</b> · unit <b>${esc(unit||'—')}</b> · from <b>${hostLabel(RD.definerOf(rec,exec.kpis))}</b><br/>inherited target <b>${fmtTarget(inhT,unit)}</b> — a higher level can override; blank here = inherit</div>
    ${tEd}</div><div class="row-actions" style="margin:0 0 8px">
    <button class="act mini" data-save="1">Save override</button>
    <button class="ghost mini" data-cancel="1">Cancel</button></div>`;
}
function renderInitPanel(){
  const host=document.getElementById("initPanel");
  const inits=divInitiatives();
  let inner="";
  if(!inits.length) inner=`<p class="hint">no initiatives in this division</p>`;
  else inits.forEach(I=>{
    const n = exec.kpis.filter(k=>k.hostType==="initiative" && k.hostId===I.id).length;
    inner+=`<div class="icard"><div class="icard-top">
      <span class="icard-title">${esc(I.name||I.id)}</span>
      <span class="pill">${n} metric${n===1?'':'s'}</span>
      <span class="icard-actions"><button class="ghost mini" data-addkpi="initiative:${I.id}">+ KPI</button></span>
      </div><div class="icard-meta">${kpiTable("initiative", I.id, null)}</div></div>`;
  });
  const acts=`<span class="pill" style="text-transform:none;letter-spacing:0">shared · link from a Key Result</span>`;
  host.innerHTML=`<div class="panel">${panelHead("INIT","Initiative-level metrics · "+divName(divisionId),inits.length||null,acts)}<div class="item-list${listOpen("INIT")}">${inner}</div></div>`;
  wireExec(host);
}

function kpiTable(hostType, hostId, objScope){
  const AK = exec.kpis, EM = emForCore();
  const rows = AK.filter(k=>k.objectiveId===objScope && k.hostType===hostType && k.hostId===hostId);
  let h = `<table class="kpitable"><thead><tr><th>KPI</th><th>dir</th><th>target</th><th>current</th><th>score</th><th>post reading</th><th></th></tr></thead><tbody>`;
  if(!rows.length) h += `<tr><td colspan="7" class="hint">no KPIs yet — add or link a measurement</td></tr>`;
  rows.forEach(k=>{
    const name = RD.kpiName(k, AK), dir = RD.kpiDirection(k, AK), unit = RD.kpiUnit(k, AK);
    const tgt = RD.effTarget(k, AK), cv = RD.effValue(k, AK, EM), s = RD.kpiScoreResolved(k, AK, EM);
    const member = isMemberKpi(k), defLinks = isDefinerWithLinks(k);
    const tgtCell = fmtTarget(tgt, unit) + (member ? (k.target!=null?' <span class="pill">override</span>':' <span class="pill">inherited</span>') : '');
    let badge = '';
    if(member) badge = `<span class="linkbadge" title="inherits from ${hostLabel(RD.definerOf(k,AK))}">🔗 linked</span>`;
    else if(defLinks) badge = `<span class="linkbadge" title="defines a linked metric">🔗 defines ${groupMemberCount(k.groupId)-1}</span>`;
    const acts = member
      ? `<button class="ghost mini" data-edit="kpi:${k.id}">override</button><button class="ghost mini" data-unlink="${k.id}">unlink</button>`
      : `<button class="ghost mini" data-edit="kpi:${k.id}">edit</button>`;
    h += `<tr><td>${esc(name||'')} ${badge}</td><td class="mono">${dir||''}</td><td class="mono">${tgtCell}</td>
      <td class="kpi-now">${cv==null?'<span class="pill">no read</span>':cv}</td>
      <td style="color:${col(RD.band(s))};font-weight:600">${s==null?'—':Math.round(s)}</td>
      <td><div class="read-row"><input class="tiny" type="number" data-read="${k.id}" placeholder="value"/>
        <button class="ghost mini" data-postread="${k.id}">post</button></div></td>
      <td class="row-actions">${acts}
        <button class="ghost mini danger ${armedDel===k.id?'armed':''}" data-del="kpi:${k.id}">${armedDel===k.id?'confirm':'del'}</button></td></tr>`;
  });
  h += `</tbody></table>`;
  return h;
}
function renderKRs(){
  const host=document.getElementById("subKR");
  const krs=exec.keyResults.filter(r=>r.objectiveId===selectedObj);
  let inner="";
  if(!krs.length) inner+=`<p class="hint">none yet — a Key Result groups the KPIs that score this objective (no Key Result ⇒ no objective score)</p>`;
  krs.forEach((kr,idx)=>{
    const s=RD.keyResultScore(kr.id, emForCore());
    inner+=`<div class="icard"><div class="icard-top">
      <span class="icard-num" data-edit="keyResult:${kr.id}" title="edit">KR${idx+1}</span>
      <span class="icard-title click" data-edit="keyResult:${kr.id}">${esc(kr.statement||kr.id)}</span>
      <span class="icard-score" style="color:${col(RD.band(s))}">${s==null?'—':Math.round(s)}</span>
      <span class="icard-actions"><button class="ghost mini" data-addkpi="keyResult:${kr.id}">+ KPI</button>
        <button class="ghost mini" data-addlink="keyResult:${kr.id}">+ link</button>
        <button class="ghost mini danger ${armedDel===kr.id?'armed':''}" data-del="keyResult:${kr.id}">${armedDel===kr.id?'confirm':'del'}</button></span>
      </div><div class="icard-meta">${kpiTable("keyResult", kr.id, selectedObj)}</div></div>`;
  });
  const acts=`<button class="ghost mini" data-addkr="1">+ add key result</button>`;
  host.innerHTML=`<div class="panel">${panelHead("KR","Key Results",krs.length,acts)}<div class="item-list${listOpen("KR")}">${inner}</div></div>`;
  wireExec(host);
}
function gateSchedRow(g){
  const committed = g.baselineDate!=null;
  const preds = (exec.stageGateEdges||[]).filter(e=>e.toGate===g.id);
  const taken = new Set(preds.map(e=>e.fromGate));
  // exclude self, existing preds, and gates this gate already precedes (blocks 2-cycles)
  const downstream = new Set((exec.stageGateEdges||[]).filter(e=>e.fromGate===g.id).map(e=>e.toGate));
  const cand = exec.stageGates.filter(x=>x.id!==g.id && !taken.has(x.id) && !downstream.has(x.id));
  let h=`<div class="gate-sched">`;
  if(committed) h+=`<span class="committed-badge" title="committed baseline — locked from upstream push">committed ${dayToIso(g.baselineDate)}</span><button class="ghost mini" data-release="${g.id}">release</button>`;
  else h+=`<button class="ghost mini" data-commit="${g.id}"${g.plannedDate==null?' disabled title="set a planned date first"':''}>commit baseline</button>`;
  h+=`<span class="sched-sep">|</span><span class="lbl">after</span>`;
  if(!preds.length) h+=`<span class="hint" style="margin:0">—</span>`;
  preds.forEach(e=>{ h+=`<span class="dep-chip">${esc(gateName(e.fromGate))}${e.lagDays?` +${e.lagDays}d`:''}<button data-edgefrom="${e.fromGate}" data-edgeto="${g.id}" title="remove">×</button></span>`; });
  if(cand.length){
    h+=`<select class="edgepick" data-edgepick="${g.id}"><option value="">+ predecessor…</option>`+
       cand.map(x=>`<option value="${x.id}">${esc(x.name||x.id)}</option>`).join('')+`</select>`+
       `<input class="laginp" type="number" min="0" placeholder="lag d" data-edgelag="${g.id}"/>`+
       `<button class="ghost mini" data-addedge="${g.id}">add</button>`;
  }
  h+=`</div>`;
  return h;
}
function renderGates(){
  const host=document.getElementById("subSG");
  const gates=exec.stageGates.filter(r=>r.objectiveId===selectedObj);
  const td=todayDay();
  let inner="";
  if(!gates.length) inner+=`<p class="hint">none yet</p>`;
  gates.forEach((g,idx)=>{
    const s=RD.stageGateScore(g.id, emForCore()), st=RD.classifyGate(g, td);
    const cmt = g.baselineDate!=null?`<span class="committed-badge" title="committed ${dayToIso(g.baselineDate)}">committed</span>`:'';
    inner+=`<div class="icard"><div class="icard-top">
      <span class="icard-num" data-edit="stageGate:${g.id}" title="edit">G${idx+1}</span>
      <span class="icard-title click" data-edit="stageGate:${g.id}">${esc(g.name||g.id)}</span>
      <span class="statepill ${st}" title="${st}">${st.replace('-',' ')}</span>${cmt}
      <span class="icard-score" style="color:${col(RD.band(s))}" title="gate readiness">${s==null?'—':Math.round(s)}</span>
      <span class="icard-actions"><span class="gate-meta">planned ${dayToIso(g.plannedDate)||'—'} · passed <input class="sm" type="date" data-pass="${g.id}" value="${dayToIso(g.actualDate)}"/></span>
        <button class="ghost mini" data-addkpi="stageGate:${g.id}">+ KPI</button>
        <button class="ghost mini" data-addlink="stageGate:${g.id}">+ link</button>
        <button class="ghost mini danger ${armedDel===g.id?'armed':''}" data-del="stageGate:${g.id}">${armedDel===g.id?'confirm':'del'}</button></span>
      </div><div class="icard-meta">${kpiTable("stageGate", g.id, selectedObj)}</div></div>`;
  });
  const chainOn=(exec.chainGatesByDate&&exec.chainGatesByDate[selectedObj])?'checked':'';
  const acts=`<button class="ghost mini" data-addsg="1">+ add gate</button><label class="chain-toggle" title="When on, gates chain in planned-date order — a slipping gate pushes the next."><input type="checkbox" data-chainobj ${chainOn}/> chain by date</label>`;
  host.innerHTML=`<div class="panel">${panelHead("SG","Stage-gates",gates.length,acts)}<div class="item-list${listOpen("SG")}">${inner}</div></div>`;
  wireExec(host);
}
function renderTasks(){
  const host=document.getElementById("subTASK");
  const rows=exec.tasks.filter(r=>r.objectiveId===selectedObj);
  let inner="";
  if(!rows.length) inner+=`<p class="hint">none yet</p>`;
  rows.forEach((t,idx)=>{
    inner+=`<div class="icard"><div class="icard-top">
      <span class="icard-num" data-edit="task:${t.id}" title="edit">T${idx+1}</span>
      <span class="icard-title click" data-edit="task:${t.id}">${esc(t.name||t.id)}</span>
      <span class="icard-actions"><span class="gate-meta">${dayToIso(t.plannedStart)||'—'} → ${dayToIso(t.plannedEnd)||'—'} ·
        <input class="tiny" type="number" min="0" max="100" data-pct="${t.id}" value="${t.percentComplete!=null?t.percentComplete:0}"/>% ·
        end <input class="sm" type="date" data-actend="${t.id}" value="${dayToIso(t.actualEnd)}"/></span>
        <button class="ghost mini" data-addkpi="task:${t.id}">+ KPI</button>
        <button class="ghost mini" data-addlink="task:${t.id}">+ link</button>
        <button class="ghost mini danger ${armedDel===t.id?'armed':''}" data-del="task:${t.id}">${armedDel===t.id?'confirm':'del'}</button></span>
      </div><div class="icard-meta">${kpiTable("task", t.id, selectedObj)}</div></div>`;
  });
  const acts=`<button class="ghost mini" data-addtask="1">+ add task</button>`;
  host.innerHTML=`<div class="panel">${panelHead("TASK","Execution tasks",rows.length,acts)}<div class="item-list${listOpen("TASK")}">${inner}</div></div>`;
  wireExec(host);
}
function wireExec(host){
  host.querySelectorAll("[data-addkr]").forEach(b=>b.onclick=()=>subOpenAdd("keyResult"));
  host.querySelectorAll("[data-addsg]").forEach(b=>b.onclick=()=>subOpenAdd("stageGate"));
  host.querySelectorAll("[data-addtask]").forEach(b=>b.onclick=()=>subOpenAdd("task"));
  host.querySelectorAll("[data-addkpi]").forEach(b=>b.onclick=()=>{ const [ht,hid]=b.dataset.addkpi.split(":"); subOpenAdd("kpi",ht,hid); });
  host.querySelectorAll("[data-addlink]").forEach(b=>b.onclick=()=>{ const [ht,hid]=b.dataset.addlink.split(":"); addingFor={type:"link",hostType:ht,hostId:hid}; editingSub=null; armedDel=null; renderAll(); });
  host.querySelectorAll("[data-savelink]").forEach(b=>b.onclick=()=>{ const [ht,hid]=b.dataset.savelink.split(":"); const sel=host.querySelector("[data-linkdef]"); if(sel) makeLinkMember(ht,hid,sel.value); });
  host.querySelectorAll("[data-unlink]").forEach(b=>b.onclick=()=>unlinkKpi(b.dataset.unlink));
  host.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{ const [t,id]=b.dataset.edit.split(":"); subOpenEdit(t,id); });
  host.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{ const [t,id]=b.dataset.del.split(":"); delSub(t,id); });
  host.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>saveSub());
  host.querySelectorAll("[data-cancel]").forEach(b=>b.onclick=()=>subCancel());
  host.querySelectorAll("[data-postread]").forEach(b=>b.onclick=()=>postRead(host, b.dataset.postread));
  host.querySelectorAll("[data-pass]").forEach(el=>el.onchange=()=>{ const r=exec.stageGates.find(x=>x.id===el.dataset.pass); r.actualDate=isoToDay(el.value)||null; setMsg("Gate updated (Save to persist).","ok"); });
  host.querySelectorAll("[data-chainobj]").forEach(el=>el.onchange=()=>{ if(!exec.chainGatesByDate) exec.chainGatesByDate={}; if(el.checked) exec.chainGatesByDate[selectedObj]=true; else delete exec.chainGatesByDate[selectedObj]; renderAll(); setMsg("Gate chaining "+(el.checked?"on":"off")+" for this objective (Save to persist).","ok"); });
  host.querySelectorAll("[data-commit]").forEach(b=>b.onclick=()=>{ const g=exec.stageGates.find(x=>x.id===b.dataset.commit); if(!g||g.plannedDate==null) return; g.baselineDate=g.plannedDate; g.locked=true; renderAll(); setMsg("Gate committed to "+dayToIso(g.baselineDate)+" (Save to persist).","ok"); });
  host.querySelectorAll("[data-release]").forEach(b=>b.onclick=()=>{ const g=exec.stageGates.find(x=>x.id===b.dataset.release); if(!g) return; g.baselineDate=null; g.locked=false; renderAll(); setMsg("Commitment released (Save to persist).","ok"); });
  host.querySelectorAll("[data-addedge]").forEach(b=>b.onclick=()=>{ const to=b.dataset.addedge; const sel=host.querySelector('[data-edgepick="'+to+'"]'); const li=host.querySelector('[data-edgelag="'+to+'"]'); const from=sel&&sel.value; if(!from){ setMsg("Pick a predecessor gate.","err"); return; } if(from===to) return; if(!exec.stageGateEdges) exec.stageGateEdges=[]; if(exec.stageGateEdges.some(e=>e.fromGate===from&&e.toGate===to)) return; const lag=(li&&li.value!=="")?Math.max(0,Number(li.value)):0; exec.stageGateEdges.push({fromGate:from,toGate:to,lagDays:lag}); renderAll(); setMsg("Predecessor added (Save to persist).","ok"); });
  host.querySelectorAll("[data-edgefrom]").forEach(b=>b.onclick=()=>{ const from=b.dataset.edgefrom, to=b.dataset.edgeto; exec.stageGateEdges=(exec.stageGateEdges||[]).filter(e=>!(e.fromGate===from&&e.toGate===to)); renderAll(); setMsg("Predecessor removed (Save to persist).","ok"); });
  host.querySelectorAll("[data-pct]").forEach(el=>el.onchange=()=>{ const r=exec.tasks.find(x=>x.id===el.dataset.pct); r.percentComplete=Number(el.value); setMsg("Task updated (Save to persist).","ok"); });
  host.querySelectorAll("[data-actend]").forEach(el=>el.onchange=()=>{ const r=exec.tasks.find(x=>x.id===el.dataset.actend); r.actualEnd=isoToDay(el.value)||null; setMsg("Task updated (Save to persist).","ok"); });
  host.querySelectorAll("[data-panel]").forEach(el=>el.onclick=()=>{ const k=el.dataset.panel; if(panelCollapsed.has(k)) panelCollapsed.delete(k); else panelCollapsed.add(k); renderAll(); });
}

/* ---------------- wiring ---------------- */
document.getElementById("saveBtn").onclick = saveExec;
document.getElementById("settingsBtn").onclick = ()=>{ const p=document.getElementById("settingsPanel"); p.style.display=p.style.display==="none"?"block":"none"; };
document.getElementById("modalX").onclick = subCancel;
document.getElementById("modalOverlay").onclick = (e)=>{ if(e.target.id==="modalOverlay") subCancel(); };
document.getElementById("tokenSave").onclick = ()=>{ localStorage.setItem("rd_broker_token", document.getElementById("tokenInput").value.trim()); setMsg("Saved.","ok"); loadAll(); };
window.addEventListener("beforeunload", stopPoll);
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* boot */
divisionId = resolveDivision();
loadAll();
</script>
