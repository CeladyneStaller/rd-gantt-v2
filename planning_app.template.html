<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>R&D Planning — Portfolio</title>
<style>
  :root{
    --bg:#0f1620; --panel:#15202d; --panel2:#1b2937; --line:#26384a;
    --ink:#e6edf3; --muted:#8aa0b4; --accent:#3fd0c9; --accent2:#7ca8ff;
    --ok:#34d399; --warn:#fbbf24; --bad:#f87171; --none:#5b7186;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  header{display:flex;align-items:center;gap:16px;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.02em}
  header h1 .dot{color:var(--accent)}
  nav{display:flex;gap:4px;margin-left:8px}
  nav button{background:none;border:1px solid transparent;color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--sans)}
  nav button.active{background:var(--panel2);color:var(--ink);border-color:var(--line)}
  nav button:hover{color:var(--ink)}
  .spacer{flex:1}
  .toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .toggle button{background:var(--panel);border:none;color:var(--muted);padding:5px 10px;cursor:pointer;font-size:12px}
  .toggle button.active{background:var(--accent);color:#08121a;font-weight:600}
  main{padding:18px;max-width:1200px;margin:0 auto}
  .msg{padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:13px;display:none}
  .msg.show{display:block}
  .msg.info{background:#13314a;color:#add4ff;border:1px solid #1d4a6e}
  .msg.err{background:#3a1620;color:#ffb4bd;border:1px solid #5e2230}
  .msg.ok{background:#13311f;color:#9ff0c4;border:1px solid #1d5e3a}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  .card h3{margin:0 0 2px;font-size:14px}
  .card .sub{color:var(--muted);font-size:12px;font-family:var(--mono)}
  .score{font-size:34px;font-weight:700;line-height:1.1;margin:10px 0 2px}
  .band{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .band.on-track{background:#10371f;color:var(--ok)} .band.at-risk{background:#3a2f10;color:var(--warn)}
  .band.off-track{background:#3a1414;color:var(--bad)} .band.no-band{background:#1c2733;color:var(--none)}
  .counts{display:flex;gap:10px;margin-top:12px;font-size:12px;font-family:var(--mono)}
  .counts span{display:flex;align-items:center;gap:5px}
  .pip{width:8px;height:8px;border-radius:99px;display:inline-block}
  .slip{margin-top:10px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .slip b{color:var(--bad)} .slip b.zero{color:var(--ok)}
  .company-hero{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:18px;display:flex;align-items:center;gap:28px}
  .company-hero .big{font-size:52px;font-weight:800;line-height:1}
  .company-hero .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td.mono,.mono{font-family:var(--mono);font-size:12px}
  .ed{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
  .ed label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--muted)}
  input,select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:6px 8px;border-radius:6px;font-family:var(--sans);font-size:13px}
  input.mono{font-family:var(--mono)}
  button.act{background:var(--accent);color:#08121a;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}
  button.ghost{background:none;border:1px solid var(--line);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
  button.danger{color:var(--bad);border-color:#5e2230}
  button.danger.armed{background:var(--bad);color:#1a0a0c}
  .row-actions{display:flex;gap:6px}
  .pf-toolbar{display:flex;justify-content:flex-end;margin-bottom:12px}
  .modal-overlay{position:fixed;inset:0;background:rgba(7,11,16,0.68);display:flex;align-items:flex-start;justify-content:center;padding:46px 16px;z-index:60;overflow:auto}
  .modal-overlay[hidden]{display:none}
  .modal-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(700px,94vw);box-shadow:0 24px 64px rgba(0,0,0,0.55);animation:popin .12s ease-out}
  @keyframes popin{from{transform:translateY(6px);opacity:.55}to{transform:none;opacity:1}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);border-radius:14px 14px 0 0}
  .modal-head span{font-weight:600;font-size:15px;color:var(--ink)}
  .modal-x{background:none;border:none;color:var(--muted);font-size:17px;line-height:1;cursor:pointer;padding:3px 9px;border-radius:6px}
  .modal-x:hover{background:var(--panel2);color:var(--ink)}
  .modal-err{margin:12px 18px 0;padding:8px 11px;border-radius:8px;background:#3a1c1c;border:1px solid #5e2c2c;color:#f4aaaa;font-size:12px;line-height:1.5}
  .modal-err[hidden]{display:none}
  #pfModalBody{padding:16px 18px 18px}
  #pfModalBody .ed{background:transparent;border:none;padding:0;margin:0}
  #pfModalBody .row-actions{margin-top:18px}
  /* initiative targets (KPIs authored in the portfolio) */
  .pftargets{margin-top:20px;border-top:1px solid var(--line);padding-top:15px}
  .pft-head{display:flex;align-items:center;justify-content:space-between}
  .pft-head>span{font-weight:600;font-size:12.5px;color:var(--ink)}
  .pft-list{display:flex;flex-direction:column;gap:6px;margin-top:9px}
  .pft-row{display:grid;grid-template-columns:auto minmax(90px,1.2fr) minmax(110px,1.5fr) auto auto;align-items:center;gap:10px;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;font-size:12px}
  .pft-name{font-weight:600;color:var(--ink)}
  .pft-sum{color:var(--muted);font-size:11.5px}
  .pft-cur{font-variant-numeric:tabular-nums;color:var(--ink);text-align:right}
  .pft-cur .muted{color:var(--muted);font-variant-numeric:normal}
  .pft-acts{display:flex;gap:5px;justify-content:flex-end}
  .pft-acts .ghost{padding:4px 9px;font-size:11px}
  .pft-acts .danger.armed{background:#3a1c1c;border-color:#5e2c2c;color:#f4aaaa}
  /* KPI editor form (target authoring) */
  #pfKpiBody{padding:16px 18px 18px}
  .pfkform{display:flex;flex-direction:column;gap:13px}
  .pffield{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted)}
  .pffield>span{font-size:11px;color:var(--muted);letter-spacing:.01em}
  .pffield input,.pffield select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:7px 9px;font-size:13px;font-family:inherit}
  .pffield input:focus,.pffield select:focus{outline:none;border-color:var(--accent)}
  .pfrow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pfseg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;width:fit-content}
  .pfsegb{background:var(--panel2);border:none;color:var(--muted);padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit}
  .pfsegb.on{background:var(--accent);color:#08121a;font-weight:600}
  .pfsegb+.pfsegb{border-left:1px solid var(--line)}
  a.idlink{color:var(--accent2);cursor:pointer;text-decoration:none;border-bottom:1px dotted transparent}
  tr.erow{cursor:pointer}
  tr.erow:hover>td{background:var(--panel2)}
  a.idlink:hover{border-bottom-color:var(--accent2)}
  #lnBody{padding:16px 18px 18px}
  .lncrumb{font-size:12px;color:var(--muted);margin:0 0 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .lncrumb a{color:var(--accent2);cursor:pointer;text-decoration:none}
  .lncrumb a:hover{text-decoration:underline}
  .lncrumb .sep{color:var(--none)}
  .lngroup{margin:0 0 15px}
  .lngroup h4{margin:0 0 7px;font-size:12px;color:var(--ink);font-weight:600}
  .lnrow{display:flex;align-items:center;gap:9px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;margin-bottom:5px;background:var(--panel2)}
  .lnrow .tag{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:1px 5px;flex:none}
  .lnnode{color:var(--accent2);cursor:pointer;text-decoration:none;font-size:13px;flex:1}
  .lnnode:hover{text-decoration:underline}
  .lnsub{font-size:11px;color:var(--muted);font-family:var(--mono);flex:none}
  .lnempty{font-size:12px;color:var(--muted);padding:3px 0}
  .lnback{background:none;border:1px solid var(--line);color:var(--muted);border-radius:6px;cursor:pointer;font-size:12px;padding:4px 10px}
  .lnback:hover{color:var(--ink);background:var(--panel2)}
  .pf-viewtoggle{display:flex;gap:4px;margin-bottom:14px}
  .pf-viewtoggle button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
  .pf-viewtoggle button.active{background:var(--panel2);color:var(--ink);border-color:var(--accent)}
  .tree{font-size:13px}
  details.tnode > summary{list-style:none;display:flex;align-items:center;padding:5px 8px;border-radius:7px;cursor:pointer;user-select:none}
  details.tnode > summary::-webkit-details-marker{display:none}
  details.tnode > summary::before{content:'▸';color:var(--muted);font-size:10px;display:inline-block;width:14px;flex:none;transition:transform .12s;opacity:.7}
  details.tnode[open] > summary::before{transform:rotate(90deg)}
  details.tnode > summary:hover{background:var(--panel2)}
  .tchildren{margin-left:14px;padding-left:13px;border-left:1px solid var(--line)}
  .tleaf{display:flex;align-items:center;padding:5px 8px 5px 22px}
  .tdot{width:7px;height:7px;border-radius:50%;flex:none;margin-right:9px}
  .ttag{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:1px 5px;flex:none}
  .ttag.exec{color:var(--accent2);border-color:#2a3a5a;background:#16233e}
  .texlab{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;flex:none;margin-right:9px;opacity:.75}
  .tname{color:var(--ink);cursor:pointer;text-decoration:none;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tname:hover{color:var(--accent);text-decoration:underline}
  .tname.muted{color:var(--muted)}
  .tname.muted:hover{color:var(--accent)}
  .tstatic{color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tsub{font-size:11px;color:var(--muted);font-family:var(--mono);flex:none;margin-left:auto;padding-left:12px;opacity:.8}
  #ganttWrap{overflow-x:auto}
  .gchart{position:relative;font-size:12px}
  .grow{display:flex;align-items:center;height:30px}
  .grow:hover{background:rgba(255,255,255,0.02)}
  .glabel{width:240px;flex:none;display:flex;align-items:center;overflow:hidden;white-space:nowrap;padding-right:8px}
  .gtri{cursor:pointer;color:var(--muted);font-size:10px;width:14px;flex:none;user-select:none;text-align:center;opacity:.7}
  .gtri:hover{color:var(--ink);opacity:1}
  .gspacer{width:14px;flex:none}
  .gdot{width:7px;height:7px;border-radius:50%;flex:none;margin-right:8px}
  .gname{color:var(--ink);cursor:pointer;text-decoration:none;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gname:hover{color:var(--accent);text-decoration:underline}
  .gname.dim{color:var(--muted)}
  .gname.dim:hover{color:var(--accent)}
  .gname.static{color:var(--muted);cursor:default}
  .gname.static:hover{color:var(--muted);text-decoration:none}
  .gtrack{position:relative;width:720px;flex:none;height:100%}
  .gaxis{display:flex;align-items:flex-end;height:22px}
  .gaxislab{position:absolute;font-size:10px;color:var(--muted);font-family:var(--mono);opacity:.8}
  .ggrid{position:absolute;top:0;bottom:0;border-left:1px solid var(--line);opacity:.5;pointer-events:none}
  .gbar{position:absolute;top:9px;height:12px;border-radius:3px;border:1px solid var(--none);box-sizing:border-box;overflow:hidden}
  .gbarfill{position:absolute;inset:0;opacity:.28}
  .gbar.derived{border-style:dashed}
  .gbar.derived .gbarfill{opacity:.16}
  .gslip{position:absolute;top:9px;height:12px;border-radius:3px;background:var(--bad);opacity:.85}
  .gdia{position:absolute;top:10px;width:10px;height:10px;transform:translateX(-50%) rotate(45deg);border-radius:2px}
  .gdia.planned{background:transparent;border:1.5px solid #6f8aa3}
  .gdia.eff{background:var(--warn)}
  .gdia.passed{background:var(--ok);border:1.5px solid var(--ok)}
  .gdia.passed-late{background:var(--warn);border:1.5px solid var(--warn)}
  .gdia.overdue{background:var(--bad);border:1.5px solid var(--bad)}
  .gdia.pending{background:transparent;border:1.5px solid #6f8aa3}
  .gdia.ghost{background:transparent;border:1.5px dashed #5a728c;opacity:.55}
  .gconn{position:absolute;top:14px;height:2px;border-radius:1px;background:#5a728c;opacity:.5;pointer-events:none}
  .gconn.committed{background:var(--bad);opacity:.7}
  .glegend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--muted);font-family:var(--mono)}
  .glegend span{display:flex;align-items:center;gap:7px}
  .glegend i{width:8px;height:8px;border-radius:2px;transform:rotate(45deg);display:inline-block;flex:none}
  .gtoday{position:absolute;top:0;bottom:0;border-left:1px solid var(--accent);opacity:.65;pointer-events:none}
  .gtodaylbl{position:absolute;top:0;font-size:9px;color:var(--accent);font-family:var(--mono);pointer-events:none;opacity:.9}
  .tabsec{display:none} .tabsec.active{display:block}
  .entity-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
  .entity-tabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px}
  .entity-tabs button.active{background:var(--panel2);color:var(--ink);border-color:var(--accent)}
  svg{display:block;width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .legend{display:flex;gap:18px;margin:10px 2px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .legend span{display:flex;align-items:center;gap:6px}
  .swatch{width:14px;height:8px;border-radius:2px;display:inline-block}
  .hint{color:var(--muted);font-size:12px;margin:8px 0}
  code{font-family:var(--mono);background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
  .settings label{display:block;margin-bottom:10px;max-width:520px}
  .pill{font-family:var(--mono);font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1><span class="dot">◆</span> R&amp;D Planning</h1>
  <nav id="nav">
    <button data-tab="company" class="active">Company</button>
    <button data-tab="portfolio">Portfolio</button>
    <button data-tab="gantt">Gantt</button>
    <button data-tab="slices">Product / Model</button>
    <button data-tab="settings">Settings</button>
  </nav>
  <div class="spacer"></div>
  <div class="toggle" id="modeToggle" title="Quarterly columns vs single overall score">
    <button data-mode="overall" class="active">Overall</button>
    <button data-mode="quarterly">Quarterly</button>
  </div>
  <button class="act" id="saveBtn" style="margin-left:12px">Save</button>
</header>
<main>
  <div class="msg" id="msg"></div>

  <section class="tabsec active" id="tab-company"></section>
  <section class="tabsec" id="tab-portfolio">
    <div id="pfViewToggle" class="pf-viewtoggle"></div>
    <div id="pfTree"></div>
    <div class="entity-tabs" id="entityTabs"></div>
    <div id="pfToolbar"></div>
    <div id="entityTable"></div>
    <div id="pfModal" class="modal-overlay" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="pfModalTitle">
        <div class="modal-head"><span id="pfModalTitle">Add</span>
          <button class="modal-x" id="pfModalClose" aria-label="Close">&#10005;</button></div>
        <div id="pfModalErr" class="modal-err" hidden></div>
        <div id="pfModalBody"></div>
      </div>
    </div>
    <div id="pfKpiModal" class="modal-overlay" hidden style="z-index:80">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="pfKpiTitle" style="width:min(560px,94vw)">
        <div class="modal-head"><span id="pfKpiTitle">Target</span>
          <button class="modal-x" id="pfKpiClose" aria-label="Close">&#10005;</button></div>
        <div id="pfKpiBody"></div>
      </div>
    </div>
    <div id="lnModal" class="modal-overlay" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="lnTitle">
        <div class="modal-head">
          <span id="lnTitle">Lineage</span>
          <span style="display:flex;gap:8px;align-items:center">
            <button class="lnback" id="lnEdit">Edit this</button>
            <button class="modal-x" id="lnClose" aria-label="Close">&#10005;</button>
          </span>
        </div>
        <div id="lnBody"></div>
      </div>
    </div>
  </section>
  <section class="tabsec" id="tab-gantt">
    <div class="legend">
      <span><i class="swatch" style="background:#2c4a63"></i> baseline</span>
      <span><i class="swatch" style="background:var(--accent)"></i> projected</span>
      <span><i class="swatch" style="background:var(--bad)"></i> slip</span>
      <span>◆ milestone (planned → effective)</span>
    </div>
    <div id="ganttWrap"></div>
  </section>
  <section class="tabsec" id="tab-slices"></section>
  <section class="tabsec settings" id="tab-settings">
    <h3>Broker</h3>
    <p class="hint">Default broker is baked in. Only the token is needed; it is stored in this browser only.
      An SSO-gated Confluence embed can pass <code>?token=…</code> once and it strips itself from the URL.</p>
    <label>Broker token
      <input class="mono" id="tokenInput" type="password" placeholder="paste token" style="width:100%"/></label>
    <button class="act" id="tokenSave">Save token</button>
    <p class="hint" id="brokerStatus"></p>
  </section>
</main>

<script>/*__CORE__*/</script>
<script>
"use strict";
const RD = window.RDCore;

/* ---------------- broker ---------------- */
const BROKER = "https://web-production-b17a2.up.railway.app";
(function seedToken(){
  const u = new URL(location.href);
  const t = u.searchParams.get("token");
  if (t){ localStorage.setItem("rd_broker_token", t); u.searchParams.delete("token");
    history.replaceState({}, "", u.toString()); }
})();
const tok = () => localStorage.getItem("rd_broker_token") || "";
const auth = () => { const t = tok(); return t ? { "Authorization":"Bearer "+t } : {}; };
async function apiVersion(id){ const r = await fetch(`${BROKER}/state/${id}/version`,{headers:auth()}); if(!r.ok) throw r; return r.json(); }
async function apiGet(id){ const r = await fetch(`${BROKER}/state/${id}`,{headers:auth()}); if(r.status===404) return null; if(!r.ok) throw r; return r.json(); }
async function apiPut(id,doc,etag){ const r = await fetch(`${BROKER}/state/${id}`,{method:"PUT",
    headers:{...auth(),"Content-Type":"application/json","If-Match":etag||"0"},body:JSON.stringify({doc})});
  if(!r.ok) throw r; return r.json(); }

/* ---------------- date <-> day-count ---------------- */
const EPOCH = Date.UTC(2020,0,1);
const isoToDay = iso => iso ? Math.round((Date.parse(iso+"T00:00:00Z")-EPOCH)/86400000) : null;
const dayToIso = d => d==null ? "" : new Date(EPOCH+d*86400000).toISOString().slice(0,10);
const todayDay = () => Math.round((Date.now()-EPOCH)/86400000);

/* ---------------- state ---------------- */
let portfolio = blankPortfolio();
let execDocs = {};               // EXEC-<div> docId -> doc
let etags = {};                  // docId -> etag (for If-Match)
let knownVersions = {};          // docId -> version (ignore own echo)
let mode = "overall";            // overall | quarterly
let pollTimer = null;

function blankPortfolio(){ return { divisions:[],products:[],models:[],initiatives:[],
  milestones:[],milestoneEdges:[],objectives:[],objectiveEdges:[],kpis:[],kpiDefs:[] }; }
function execIdFor(divId){ return "EXEC-"+divId; }
function execMap(){ const m={}; for(const id in execDocs){ m[id.slice(5)] = execDocs[id]; } return m; }
// docs map for cross-document KPI resolution: portfolio targets + exec readings
function pfMap(){ return RD.withPortfolio(portfolio, execMap()); }
// flatten every doc's KPIs into the resolution pool (mirrors core allKpis)
function poolOf(pm){ const out=[]; for(const k in pm){ const ks=(pm[k].kpis)||[]; for(let i=0;i<ks.length;i++) out.push(ks[i]); } return out; }
function fmtNum(v){ return v==null?"—":(Math.round(v*100)/100)+""; }

/* ---------------- messaging (no native modals) ---------------- */
function setMsg(text, kind){ const el=document.getElementById("msg"); el.textContent=text;
  el.className="msg show "+(kind||"info"); if(kind==="ok") setTimeout(()=>el.classList.remove("show"),2500); }
function clearMsg(){ document.getElementById("msg").classList.remove("show"); }

/* ---------------- load / save ---------------- */
function watchedDocs(){ return ["portfolio","gantt-view", ...portfolio.divisions.map(d=>execIdFor(d.id))]; }

async function loadAll(){
  if(!tok()){ setMsg("No broker token yet — add one in Settings to load live data. Showing local scratch.", "info"); return; }
  try{
    const p = await apiGet("portfolio");
    if(p){ portfolio = Object.assign(blankPortfolio(), p.doc); etags["portfolio"]=p.etag; knownVersions["portfolio"]=p.version; }
    const gv = await apiGet("gantt-view");
    if(gv){ etags["gantt-view"]=gv.etag; knownVersions["gantt-view"]=gv.version; window._ganttView=gv.doc; }
    execDocs = {};
    for(const d of portfolio.divisions){
      const id = execIdFor(d.id);
      const ex = await apiGet(id);
      if(ex){ execDocs[id]=ex.doc; etags[id]=ex.etag; knownVersions[id]=ex.version; }
    }
    setMsg("Loaded portfolio + "+Object.keys(execDocs).length+" division docs.", "ok");
    startPoll();
  }catch(e){ setMsg("Load failed ("+(e.status||e)+"). Check the token in Settings.", "err"); }
  renderAll();
}

async function saveAll(){
  if(!tok()){ setMsg("Add a broker token in Settings before saving.", "err"); return; }
  try{
    const res = await apiPut("portfolio", portfolio, etags["portfolio"]||"0");
    etags["portfolio"]=res.etag; knownVersions["portfolio"]=res.version;   // ignore own echo on next poll
    const gv = window._ganttView || { overrides:{} };
    const gres = await apiPut("gantt-view", gv, etags["gantt-view"]||"0");
    etags["gantt-view"]=gres.etag; knownVersions["gantt-view"]=gres.version;
    setMsg("Saved.", "ok");
  }catch(e){
    if(e.status===412){ setMsg("Someone else saved first — reloading their version, then re-apply your change.", "err"); await loadAll(); }
    else setMsg("Save failed ("+(e.status||e)+").", "err");
  }
}

// Auto-save a single portfolio mutation. `reapply` re-applies that one change
// onto a freshly reloaded portfolio if a concurrent save bumped the etag (412),
// so an auto-saved add/edit/delete is never silently lost to a race.
async function persistPortfolio(reapply, okMsg){
  if(!tok()){ setMsg("Saved locally — add a broker token in Settings to sync.", "info"); return; }
  try{
    const res = await apiPut("portfolio", portfolio, etags["portfolio"]||"0");
    etags["portfolio"]=res.etag; knownVersions["portfolio"]=res.version;
    setMsg(okMsg||"Saved.", "ok");
  }catch(e){
    if(e.status===412){
      try{
        const p = await apiGet("portfolio");
        if(p){ portfolio = Object.assign(blankPortfolio(), p.doc); etags["portfolio"]=p.etag; knownVersions["portfolio"]=p.version; }
        if(reapply) reapply();                          // re-apply this change onto their version
        const res2 = await apiPut("portfolio", portfolio, etags["portfolio"]||"0");
        etags["portfolio"]=res2.etag; knownVersions["portfolio"]=res2.version;
        renderPortfolio(); renderCompany();
        setMsg((okMsg||"Saved.")+" (merged with a concurrent change)", "ok");
      }catch(e2){
        renderPortfolio(); renderCompany();
        setMsg("Auto-save hit a conflict and couldn't merge ("+(e2.status||e2)+") — reloaded; re-apply and use Save.", "err");
      }
    } else {
      setMsg("Auto-save failed ("+(e.status||e)+"). Your change is local — use Save to retry.", "err");
    }
  }
}

/* version-gated polling: ONE timer, version endpoint only, pull on change, own echo ignored */
function startPoll(){ if(pollTimer) return; pollTimer=setInterval(pollOnce, 25000); }
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
async function pollOnce(){
  for(const id of watchedDocs()){
    try{ const v = await apiVersion(id);
      if(v.version !== knownVersions[id]){ const fresh = await apiGet(id);
        if(fresh){ if(id==="portfolio") portfolio=Object.assign(blankPortfolio(),fresh.doc);
          else if(id==="gantt-view") window._ganttView=fresh.doc;
          else execDocs[id]=fresh.doc;
          etags[id]=fresh.etag; knownVersions[id]=fresh.version; renderAll();
          setMsg("Updated from another editor.", "info"); } }
    }catch(e){}
  }
}

/* ---------------- COMPANY tab ---------------- */
function renderCompany(){
  const root = document.getElementById("tab-company");
  const em = pfMap();
  const comp = RD.rollupCompany(portfolio, em);
  let hero = `<div class="company-hero">
      <div><div class="big" style="color:${scoreColor(comp)}">${fmtScore(comp)}</div></div>
      <div><div class="lbl">Company score · overall</div>${bandHtml(comp)}
        <div class="slip">${portfolio.divisions.length} divisions · ${portfolio.objectives.length} objectives</div></div></div>`;

  const casc = RD.cascade(portfolio, em, todayDay());
  let cards = `<div class="cards">`;
  for(const d of portfolio.divisions){
    const counts = statusCounts("division", d.id, em);
    const worst = worstSlip(d.id, casc);
    if(mode==="overall"){
      const sc = RD.rollupDivision(d.id, portfolio, em);
      cards += divCard(d, [["overall", sc]], counts, worst);
    } else {
      const qs = RD.boundsOf("division", d.id, portfolio);
      const cells = qs.length ? qs.map(q=>[q, RD.score("division",d.id,portfolio,em,q)])
                              : [["—", null]];
      cards += divCard(d, cells, counts, worst);
    }
  }
  cards += `</div>`;
  if(!portfolio.divisions.length) cards = `<p class="hint">No divisions yet. Add one in the Portfolio tab to begin.</p>`;
  root.innerHTML = hero + cards;
}
function divCard(d, cells, counts, worst){
  const scoreBlocks = cells.map(([lbl,v])=>`
    <div style="display:inline-block;margin-right:14px">
      <div class="score" style="font-size:24px;color:${scoreColor(v)}">${fmtScore(v)}</div>
      <div class="pill">${lbl}</div></div>`).join("");
  const slipTxt = worst==null ? `<span>no schedule data</span>`
    : `worst initiative slip <b class="${worst<=0?'zero':''}">${worst<=0?'0':'+'+worst}d</b>`;
  return `<div class="card"><h3>${esc(d.name)}</h3><div class="sub">${d.id}</div>
    <div style="margin-top:10px">${scoreBlocks}</div>
    <div class="counts">
      <span><i class="pip" style="background:var(--ok)"></i>${counts["on-track"]}</span>
      <span><i class="pip" style="background:var(--warn)"></i>${counts["at-risk"]}</span>
      <span><i class="pip" style="background:var(--bad)"></i>${counts["off-track"]}</span>
      <span><i class="pip" style="background:var(--none)"></i>${counts["no-band"]}</span></div>
    <div class="slip">${slipTxt}</div></div>`;
}
function statusCounts(type, id, em){
  const c={"on-track":0,"at-risk":0,"off-track":0,"no-band":0};
  const objs = portfolio.objectives.filter(o=>type==="division"?o.divisionId===id:true);
  objs.forEach(o=>{ c[RD.band(RD.objectiveScore(o.id, em))]++; });
  return c;
}
function worstSlip(divId, casc){
  let w=null;
  portfolio.initiatives.filter(i=>i.divisionId===divId).forEach(i=>{
    const s=casc.longTermSlip[i.id]; if(s!=null){ w = (w==null)?s:Math.max(w,s); } });
  return w;
}
function scoreColor(v){ const b=RD.band(v);
  return b==="on-track"?"var(--ok)":b==="at-risk"?"var(--warn)":b==="off-track"?"var(--bad)":"var(--none)"; }

/* ---------------- initiative targets (portfolio-defined KPIs) ---------------- */
const STAT_OPTS=[["average","Average"],["median","Median"],["stddev","Std dev"],["cv","CV %"],["range","Range"],["max","Max"],["min","Min"]];
let pfTgtArmed=null;                          // kpiId armed for removal
let pfKpiInit=null, pfKpiEditId=null, pfKpiDraft=null;   // KPI sub-editor state

function targetSummary(k){
  const tt=k.targetType||"demonstration";
  if(tt==="binary") return "Binary · met / not met";
  const dir=k.direction==="down"?"≤":"≥";
  const tgt=(k.target!=null&&k.target!=="")?k.target:"—";
  const unit=k.unit?(" "+k.unit):"";
  if(tt==="statistical"){
    const st=(STAT_OPTS.find(o=>o[0]===(k.statistic||"average"))||["","value"])[1];
    const n=(k.readCount!=null&&k.readCount!=="")?("last "+k.readCount):"all";
    return `${st} of ${n} ${dir} ${tgt}${unit}`;
  }
  return `${dir} ${tgt}${unit}`;
}
function initTargetsHtml(initId){
  const list=(portfolio.kpis||[]).filter(k=>k.hostType==="initiative" && k.hostId===initId);
  const pm=pfMap(), pool=poolOf(pm);
  let h=`<div class="pftargets"><div class="pft-head"><span>Targets — initiative KPIs</span>`+
    `<button class="ghost" id="pfAddTarget">+ Add target</button></div>`;
  if(!list.length){
    h+=`<p class="hint" style="margin:8px 0 0">No targets yet. Define an initiative-level KPI here; link Key Results, stage-gates, or tasks to it from the execution app to feed its value.</p>`;
  } else {
    h+=`<div class="pft-list">`;
    list.forEach(k=>{
      const val=RD.effValue(k,pool,pm), sc=RD.kpiScoreResolved(k,pool,pm), bnd=RD.band(sc);
      const valTxt=(val==null)?`<span class="muted">no read</span>`:`${esc(fmtNum(val))}${k.unit?(" "+esc(k.unit)):""}`;
      const armed=pfTgtArmed===k.id;
      h+=`<div class="pft-row" data-tgtid="${k.id}">`+
        `<span class="tdot" style="background:${bandColor(bnd)}" title="${bnd}"></span>`+
        `<span class="pft-name">${esc(k.name||k.id)}</span>`+
        `<span class="pft-sum">${esc(targetSummary(k))}</span>`+
        `<span class="pft-cur">${valTxt}</span>`+
        `<span class="pft-acts"><button class="ghost" data-tedit="${k.id}">edit</button>`+
        `<button class="ghost danger ${armed?'armed':''}" data-tdel="${k.id}">${armed?'confirm':'remove'}</button></span>`+
      `</div>`;
    });
    h+=`</div>`;
  }
  return h+`</div>`;
}
function refreshInitTargets(initId){
  const host=document.querySelector("#pfModalBody .pftargets");
  if(!host) return;
  const tmp=document.createElement("div"); tmp.innerHTML=initTargetsHtml(initId);
  host.replaceWith(tmp.firstElementChild);
  wireInitTargets(initId);
}
function wireInitTargets(initId){
  const add=document.getElementById("pfAddTarget"); if(add) add.onclick=()=>openKpiEditor(initId,null);
  document.querySelectorAll("#pfModalBody [data-tedit]").forEach(b=>b.onclick=()=>openKpiEditor(initId,b.dataset.tedit));
  document.querySelectorAll("#pfModalBody [data-tdel]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.tdel;
    if(pfTgtArmed!==id){ pfTgtArmed=id; refreshInitTargets(initId); return; }
    pfTgtArmed=null; removeTarget(initId,id);
  });
}
function removeTarget(initId,kpiId){
  portfolio.kpis=(portfolio.kpis||[]).filter(k=>k.id!==kpiId);
  refreshInitTargets(initId); renderCompany();
  persistPortfolio(()=>{ portfolio.kpis=(portfolio.kpis||[]).filter(k=>k.id!==kpiId); }, "Target removed.");
}

function openKpiEditor(initId,kpiId){
  pfKpiInit=initId; pfKpiEditId=kpiId||null;
  const ex=kpiId?(portfolio.kpis||[]).find(k=>k.id===kpiId):null;
  pfKpiDraft=ex?Object.assign({},ex):{targetType:"demonstration",direction:"up"};
  document.getElementById("pfKpiTitle").textContent=kpiId?"Edit target":"Add target";
  renderKpiEditor();
  document.getElementById("pfKpiModal").hidden=false;
}
function renderKpiEditor(){
  const body=document.getElementById("pfKpiBody");
  body.innerHTML=pfKpiFormHtml(pfKpiDraft);
  body.querySelectorAll("[data-seg]").forEach(seg=>{
    const key=seg.dataset.seg;
    seg.querySelectorAll("[data-segv]").forEach(b=>b.onclick=()=>{ pfKpiDraft[key]=b.dataset.segv; renderKpiEditor(); });
  });
  body.querySelectorAll("[data-k]").forEach(el=>{
    el.onchange=()=>{ const k=el.dataset.k; pfKpiDraft[k]=(el.type==="number")?(el.value===""?null:Number(el.value)):el.value; };
  });
  document.getElementById("pfKpiSave").onclick=saveKpiEditor;
  document.getElementById("pfKpiCancel").onclick=closeKpiEditor;
  const f=body.querySelector("[data-k]"); if(f) f.focus();
}
function closeKpiEditor(){ pfKpiInit=null; pfKpiEditId=null; pfKpiDraft=null; const m=document.getElementById("pfKpiModal"); if(m) m.hidden=true; }
function saveKpiEditor(){
  const d=pfKpiDraft, initId=pfKpiInit;
  const tt=d.targetType||"demonstration";
  const rec={ hostType:"initiative", hostId:initId, objectiveId:null, isDefiner:true, groupId:null,
    name:(d.name||"").trim(), targetType:tt };
  if(tt!=="binary"){
    rec.direction=(d.direction==="down")?"down":"up";
    rec.target=(d.target!=null&&d.target!=="")?Number(d.target):null;
    rec.unit=(d.unit||"").trim();
  }
  if(tt==="statistical"){
    rec.statistic=d.statistic||"average";
    rec.readCount=(d.readCount!=null&&d.readCount!=="")?Number(d.readCount):null;
  }
  portfolio.kpis=portfolio.kpis||[];
  let reapply;
  if(pfKpiEditId){
    const id=pfKpiEditId, k=portfolio.kpis.find(x=>x.id===id); if(k) Object.assign(k,rec);
    reapply=()=>{ portfolio.kpis=portfolio.kpis||[]; const t=portfolio.kpis.find(x=>x.id===id); if(t) Object.assign(t,rec); else portfolio.kpis.push(Object.assign({id},rec)); };
  } else {
    const id=RD.allocId("kpi", initId, portfolio.kpis.map(x=>x.id)); rec.id=id;
    portfolio.kpis.push(rec);
    reapply=()=>{ portfolio.kpis=portfolio.kpis||[]; if(!portfolio.kpis.some(x=>x.id===id)) portfolio.kpis.push(rec); };
  }
  closeKpiEditor();
  refreshInitTargets(initId); renderCompany();
  persistPortfolio(reapply, "Target saved.");
}

/* ---------------- lineage navigator (read-only) ---------------- */
const TAG={division:"div",product:"prod",model:"model",initiative:"init",milestone:"ms",objective:"obj"};
let lnFocus=null, lnStack=[];
function byId(entity,id){ const a=SEL[entity]&&SEL[entity](); return a?a.find(x=>x.id===id):null; }
function nameOf(entity,r){ return r ? (r.name||r.statement||r.id) : "(missing)"; }
function subCount(entity,r){
  const P=portfolio;
  if(entity==="division") return `${P.products.filter(p=>p.divisionId===r.id).length} prod · ${P.initiatives.filter(i=>i.divisionId===r.id).length} init · ${P.objectives.filter(o=>o.divisionId===r.id).length} obj`;
  if(entity==="product")  return `${P.models.filter(m=>m.productId===r.id).length} models · ${P.objectives.filter(o=>o.productId===r.id).length} obj`;
  if(entity==="model")    return `${P.objectives.filter(o=>o.modelId===r.id).length} obj`;
  if(entity==="initiative") return `${P.milestones.filter(m=>m.initiativeId===r.id).length} ms · ${P.objectives.filter(o=>o.initiativeId===r.id).length} obj`;
  if(entity==="milestone")  return `${P.objectives.filter(o=>(o.milestoneIds||[]).indexOf(r.id)>=0).length} obj`;
  if(entity==="objective"){ const doc=execDocs["EXEC-"+r.divisionId]; if(doc){ const k=(doc.keyResults||[]).filter(x=>x.objectiveId===r.id).length; const g=(doc.stageGates||[]).filter(x=>x.objectiveId===r.id).length; return `${k} KR · ${g} gates`; } return r.quarter||""; }
  return "";
}

/* ---- recursive architecture tree (shared by Portfolio tab + modal) ---- */
function hasArchChildren(entity,id){
  const P=portfolio;
  if(entity==="division") return P.initiatives.some(i=>i.divisionId===id)||P.products.some(p=>p.divisionId===id);
  if(entity==="initiative") return P.milestones.some(m=>m.initiativeId===id)||P.objectives.some(o=>o.initiativeId===id);
  if(entity==="product") return P.models.some(m=>m.productId===id);
  if(entity==="objective"){ const o=byId("objective",id); const d=o&&execDocs["EXEC-"+o.divisionId]; if(!d) return false;
    return (d.keyResults||[]).some(k=>k.objectiveId===id)||(d.stageGates||[]).some(g=>g.objectiveId===id); }
  return false;
}
/* ---- health band → colour (shared by tree + gantt) ---- */
function bandColor(b){ return b==='on-track'?'var(--ok)':b==='at-risk'?'var(--warn)':b==='off-track'?'var(--bad)':'var(--none)'; }
function nodeBand(entity,id){ const em=pfMap(); let s=null;
  if(entity==="division") s=RD.rollupDivision(id,portfolio,em);
  else if(entity==="initiative") s=RD.rollupInitiative(id,portfolio,em);
  else if(entity==="objective") s=RD.rollupObjective(id,portfolio,em);
  return RD.band(s); }
const STATUS_ENTITIES={division:1,initiative:1,objective:1};
const TREE_NAME_STYLE={division:"font-size:14px;font-weight:600",initiative:"font-size:13.5px;font-weight:500",objective:"font-size:13px;font-weight:500",product:"font-size:13px;font-weight:500",model:"font-size:12.5px;font-weight:400",milestone:"font-size:12.5px;font-weight:400"};
const TREE_MUTED={model:1,milestone:1};
function rowDot(entity,id){ if(!STATUS_ENTITIES[entity]) return ""; const b=nodeBand(entity,id); return `<span class="tdot" style="background:${bandColor(b)}" title="${b}"></span>`; }
function rowName(entity,r){ const st=TREE_NAME_STYLE[entity]||"", mu=TREE_MUTED[entity]?" muted":""; return `<a class="tname${mu}" style="${st}" data-lineage="${entity}:${r.id}">${esc(nameOf(entity,r))}</a>`; }
function treeRow(entity,r){ const sub=subCount(entity,r); return `${rowDot(entity,r.id)}${rowName(entity,r)}${sub?`<span class="tsub">${esc(sub)}</span>`:''}`; }
function leafRow(entity,r){ return `<div class="tleaf">${rowDot(entity,r.id)}${rowName(entity,r)}</div>`; }
function execLeaf(tag,label){ return `<div class="tleaf"><span class="texlab">${esc(tag)}</span><span class="tstatic">${esc(label)}</span></div>`; }
function nodeHtml(entity,r){
  if(!hasArchChildren(entity,r.id)) return leafRow(entity,r);
  return `<details open class="tnode"><summary>${treeRow(entity,r)}</summary><div class="tchildren">${treeChildrenHtml(entity,r.id)}</div></details>`;
}
function objectiveExecHtml(objId){
  const o=byId("objective",objId), doc=o&&execDocs["EXEC-"+o.divisionId];
  if(!doc) return `<div class="tleaf"><span class="tstatic">no exec doc loaded for this division</span></div>`;
  let h="";
  (doc.keyResults||[]).filter(k=>k.objectiveId===objId).forEach(k=> h+=execLeaf("KR", k.statement||k.id));
  (doc.stageGates||[]).filter(g=>g.objectiveId===objId).forEach(g=> h+=execLeaf("Gate", g.name||g.id));
  return h || `<div class="tleaf"><span class="tstatic">no key results or stage-gates yet</span></div>`;
}
function treeChildrenHtml(entity,id){
  const P=portfolio; let h="";
  if(entity==="division"){
    P.initiatives.filter(i=>i.divisionId===id).forEach(i=> h+=nodeHtml("initiative",i));
    P.products.filter(p=>p.divisionId===id).forEach(p=> h+=nodeHtml("product",p));
  } else if(entity==="initiative"){
    P.milestones.filter(m=>m.initiativeId===id).forEach(m=> h+=leafRow("milestone",m));
    P.objectives.filter(o=>o.initiativeId===id).forEach(o=> h+=nodeHtml("objective",o));
  } else if(entity==="product"){
    P.models.filter(m=>m.productId===id).forEach(m=> h+=leafRow("model",m));
  } else if(entity==="objective"){
    h+=objectiveExecHtml(id);
  }
  return h;
}
function wireTreeLinks(root){
  root.querySelectorAll("[data-lineage]").forEach(a=>a.onclick=(e)=>{ e.preventDefault(); e.stopPropagation(); const s=a.dataset.lineage,i=s.indexOf(":"); openLineage(s.slice(0,i), s.slice(i+1)); });
}
function renderPortfolioTree(){
  const host=document.getElementById("pfTree");
  const divs=portfolio.divisions;
  if(!divs.length){ host.innerHTML='<p class="hint">No divisions yet — switch to Tables to add one.</p>'; return; }
  let h=`<div class="tree">`;
  divs.forEach(d=> h+=nodeHtml("division",d));
  h+=`</div>`;
  host.innerHTML=h;
  wireTreeLinks(host);
}

/* ---- lineage modal: up-chain breadcrumb + subtree + cross-links ---- */
function upChain(entity,id){
  const up=[], crumb=(e,fid)=>{ const r=byId(e,fid); if(r) up.push({entity:e,id:fid,label:nameOf(e,r)}); };
  if(entity==="product"){ const p=byId("product",id); if(p) crumb("division",p.divisionId); }
  else if(entity==="model"){ const m=byId("model",id); if(m){ const p=byId("product",m.productId); if(p){ crumb("division",p.divisionId); crumb("product",p.id); } } }
  else if(entity==="initiative"){ const i=byId("initiative",id); if(i) crumb("division",i.divisionId); }
  else if(entity==="milestone"){ const ms=byId("milestone",id); if(ms){ const i=byId("initiative",ms.initiativeId); if(i){ crumb("division",i.divisionId); crumb("initiative",i.id); } } }
  else if(entity==="objective"){ const o=byId("objective",id); if(o){ if(o.divisionId) crumb("division",o.divisionId); if(o.initiativeId) crumb("initiative",o.initiativeId); } }
  return up;
}
function relatedGroups(entity,id){
  const P=portfolio, item=(e,r)=>({entity:e,id:r.id,name:nameOf(e,r),tag:TAG[e],sub:subCount(e,r)}), out=[];
  if(entity==="objective"){
    const o=byId("objective",id), cls=[];
    if(o&&o.productId){ const p=byId("product",o.productId); if(p) cls.push(item("product",p)); }
    if(o&&o.modelId){ const m=byId("model",o.modelId); if(m) cls.push(item("model",m)); }
    if(cls.length) out.push({title:"Classification", items:cls});
    const mils=((o&&o.milestoneIds)||[]).map(mid=>byId("milestone",mid)).filter(Boolean);
    if(mils.length) out.push({title:"Linked milestones", items:mils.map(m=>item("milestone",m))});
  } else if(entity==="milestone"){
    const objs=P.objectives.filter(o=>(o.milestoneIds||[]).indexOf(id)>=0);
    if(objs.length) out.push({title:"Objectives linking this", items:objs.map(o=>item("objective",o))});
  } else if(entity==="product"||entity==="model"){
    const objs=P.objectives.filter(o=>(entity==="product"?o.productId:o.modelId)===id);
    if(objs.length) out.push({title:"Objectives classified here", items:objs.map(o=>item("objective",o))});
  }
  return out;
}
function renderLineageModal(){
  if(!lnFocus) return;
  const {entity,id}=lnFocus, rec=byId(entity,id);
  if(!rec){ closeLineage(); return; }
  document.getElementById("lnTitle").textContent=cap(entity)+" · "+nameOf(entity,rec);
  let h=`<div class="lncrumb">`;
  if(lnStack.length) h+=`<button class="lnback" data-lnback="1">← back</button>`;
  upChain(entity,id).forEach(a=>{ h+=`<a data-lineage="${a.entity}:${a.id}">${esc(a.label)}</a><span class="sep">›</span>`; });
  h+=`<span style="color:var(--ink)">${esc(nameOf(entity,rec))}</span></div>`;
  const sub=treeChildrenHtml(entity,id);
  h+= sub ? `<div class="tree">${sub}</div>` : `<p class="lnempty">No architecture beneath this node.</p>`;
  relatedGroups(entity,id).forEach(g=>{
    h+=`<div class="lngroup"><h4>${esc(g.title)}</h4>`;
    g.items.forEach(it=>{ h+=`<div class="lnrow"><span class="tag">${it.tag}</span><a class="lnnode" data-lineage="${it.entity}:${it.id}">${esc(it.name)}</a>${it.sub?`<span class="lnsub">${esc(it.sub)}</span>`:''}</div>`; });
    h+=`</div>`;
  });
  const body=document.getElementById("lnBody"); body.innerHTML=h;
  wireTreeLinks(body);
  const bk=body.querySelector("[data-lnback]"); if(bk) bk.onclick=lnBack;
  document.getElementById("lnModal").hidden=false;
}
function openLineage(entity,id){ if(lnFocus) lnStack.push(lnFocus); lnFocus={entity,id}; renderLineageModal(); }
function lnBack(){ if(lnStack.length){ lnFocus=lnStack.pop(); renderLineageModal(); } }
function closeLineage(){ lnFocus=null; lnStack=[]; const m=document.getElementById("lnModal"); if(m) m.hidden=true; const b=document.getElementById("lnBody"); if(b) b.innerHTML=""; }
function editFocused(){ if(!lnFocus) return; const {entity,id}=lnFocus; closeLineage(); activeEntity=entity; renderPortfolio(); openEditor(id); }
function refFieldNote(k){ return (k==="productId"||k==="modelId") ? ' <span class="pill">classification</span>' : ''; }

function readEditor(){
  const out = {};
  document.querySelectorAll("#pfModalBody [data-f]").forEach(el=>{
    const k = el.dataset.f;
    if(el.multiple){ out[k]=Array.from(el.selectedOptions).map(o=>o.value); }
    else if(el.type==="date"){ out[k]=isoToDay(el.value)||null; }
    else if(el.type==="number"){ out[k]= el.value===""?0:Number(el.value); }
    else out[k] = el.value==="" ? null : el.value;
  });
  // classification: at most one of productId/modelId — model wins, clear the other
  if(out.modelId){ out.productId=null; }
  return out;
}
function saveRecord(){
  const data = readEditor();
  const ent = activeEntity;
  const list = SEL[ent]();
  hideEditorErr();
  let reapply;
  if(editingId){
    const id = editingId;
    const rec = list.find(x=>x.id===id);
    const merged = Object.assign({}, rec, data);
    if(!validateAndWarn(ent, merged)) return;   // validate before mutating
    Object.assign(rec, data);
    reapply = ()=>{ const r=SEL[ent]().find(x=>x.id===id); if(r) Object.assign(r, data); else SEL[ent]().push(Object.assign({id}, data)); };
  } else {
    const id = allocFor(ent, data);
    const rec = Object.assign({id}, data);
    if(!validateAndWarn(ent, rec)) return;
    list.push(rec);
    reapply = ()=>{ if(!SEL[ent]().some(x=>x.id===id)) SEL[ent]().push(rec); };
  }
  closeEditor(); renderPortfolio(); renderCompany();
  persistPortfolio(reapply, cap(ent)+" saved.");
}
function validateAndWarn(entity, rec){
  if(entity==="objective" || entity==="initiative"){
    // objective validates against its initiative; initiative validates only its own both-set invariant
    if(rec.productId && rec.modelId){ showEditorErr("A node can pin a product OR a model, not both."); return false; }
    if(entity==="objective"){
      const v = RD.validateClassification(rec, portfolio);
      if(!v.ok){ showEditorErr("Classification blocked: "+v.reason); return false; }
    }
  }
  return true;
}
function allocFor(entity, data){
  if(entity==="division"){
    const code = (data.name||"DIV").replace(/[^A-Za-z0-9]/g,"").slice(0,4).toUpperCase()||"DIV";
    return RD.allocId("division", null, portfolio.divisions.map(x=>x.id), {code});
  }
  if(entity==="product") return RD.allocId("product", data.divisionId, portfolio.products.map(x=>x.id));
  if(entity==="model")   return RD.allocId("model", data.productId, portfolio.models.map(x=>x.id));
  if(entity==="initiative") return RD.allocId("initiative", data.divisionId, portfolio.initiatives.map(x=>x.id));
  if(entity==="milestone")  return RD.allocId("milestone", data.initiativeId, portfolio.milestones.map(x=>x.id));
  if(entity==="objective")  return RD.allocId("objective", data.divisionId, portfolio.objectives.map(x=>x.id), {quarter:data.quarter||"UNSET"});
}

let armedDelete = null;
function renderTable(){
  const cols = SCHEMAS[activeEntity].map(s=>s[0]).filter(k=>k!=="desc");
  const list = SEL[activeEntity]();
  let html = `<table><thead><tr><th>id</th>${cols.map(c=>`<th>${c}</th>`).join("")}<th></th></tr></thead><tbody>`;
  for(const r of list){
    html += `<tr class="erow" data-editrow="${r.id}" title="click to edit"><td class="mono"><a class="idlink" data-lineage="${activeEntity}:${r.id}">${r.id}</a></td>`+
      cols.map(c=>`<td>${cellVal(c,r[c])}</td>`).join("")+
      `<td class="row-actions">
        <button class="ghost danger ${armedDelete===r.id?'armed':''}" data-del="${r.id}">${armedDelete===r.id?'confirm':'delete'}</button></td></tr>`;
  }
  html += `</tbody></table>`;
  if(!list.length) html = `<p class="hint">No ${activeEntity}s yet.</p>`;
  document.getElementById("entityTable").innerHTML = html;
  document.querySelectorAll("#entityTable [data-lineage]").forEach(a=>a.onclick=(e)=>{ e.stopPropagation(); const s=a.dataset.lineage,i=s.indexOf(":"); openLineage(s.slice(0,i), s.slice(i+1)); });
  document.querySelectorAll("#entityTable [data-editrow]").forEach(tr=>tr.onclick=()=>{ armedDelete=null; openEditor(tr.dataset.editrow); });
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const id=b.dataset.del;
    if(armedDelete!==id){ armedDelete=id; renderTable(); return; }
    const ent = activeEntity;
    SEL[ent]().splice(SEL[ent]().findIndex(x=>x.id===id),1);
    armedDelete=null; renderPortfolio(); renderCompany();
    persistPortfolio(()=>{ const i=SEL[ent]().findIndex(x=>x.id===id); if(i>=0) SEL[ent]().splice(i,1); }, cap(ent)+" deleted.");
  });
}
function cellVal(col,v){
  if(v==null||v==="") return '<span class="pill">—</span>';
  if(DATE_FIELDS.has(col)) return `<span class="mono">${dayToIso(v)}</span>`;
  if(Array.isArray(v)) return `<span class="mono">${v.join(", ")||"—"}</span>`;
  if(col==="productId"||col==="modelId"||col.endsWith("Id")) return `<span class="mono">${esc(String(v))}</span>`;
  return esc(String(v));
}

/* ---------------- GANTT tab ---------------- */
let ganttCollapsed = new Set();
function renderGantt(){
  const em = pfMap(), casc = RD.cascade(portfolio, em, todayDay()), td = todayDay(), P = portfolio;
  const gatesOf = o => (execDocs["EXEC-"+o.divisionId]?.stageGates||[]).filter(g=>g.objectiveId===o.id);
  const pfGate = g => g.actualDate!=null ? g.actualDate : Math.max(g.plannedDate, td);
  // ---- geometry per node: bars (span) for div/init/obj, diamonds (point) for milestone/gate ----
  function geom(entity, r){
    if(entity==="stagegate"){ const ge=casc.gateEffective[r.id]; return {kind:"diamond", gate:true, planned:r.plannedDate, eff:(ge!=null?ge:(r.plannedDate==null?null:pfGate(r))), baseline:(r.baselineDate!=null?r.baselineDate:null), slipped:!!(casc.gateSlipped&&casc.gateSlipped[r.id]), state:RD.classifyGate(r, td)}; }
    if(entity==="milestone") return {kind:"diamond", planned:r.plannedDate, eff:casc.milestoneEffective[r.id]};
    if(entity==="objective"){
      const starts=gatesOf(r).map(g=>g.plannedDate).filter(v=>v!=null);
      const peRaw=casc.objectiveProjectedEnd[r.id], pe=(peRaw!=null&&peRaw>0)?peRaw:null;
      const ds=r.plannedStart!=null?r.plannedStart:(starts.length?Math.min.apply(null,starts):null);
      const de=r.plannedEnd!=null?r.plannedEnd:pe;
      const slip=r.plannedEnd!=null?Math.max(0,(pe!=null?pe:r.plannedEnd)-r.plannedEnd):0;
      return {kind:"bar", ds, de, pe, slip, derived:(r.plannedStart==null||r.plannedEnd==null)};
    }
    if(entity==="initiative"){
      const objs=P.objectives.filter(o=>o.initiativeId===r.id), mils=P.milestones.filter(m=>m.initiativeId===r.id);
      const starts=[]; objs.forEach(o=>{ const g=geom("objective",o); if(g.ds!=null) starts.push(g.ds); }); mils.forEach(m=>{ if(m.plannedDate!=null) starts.push(m.plannedDate); });
      const peRaw=casc.initiativeProjectedEnd[r.id], pe=(peRaw!=null&&peRaw>0)?peRaw:null;
      const ds=r.plannedStart!=null?r.plannedStart:(starts.length?Math.min.apply(null,starts):null);
      const de=r.plannedEnd!=null?r.plannedEnd:pe;
      const slip=r.plannedEnd!=null?(casc.longTermSlip[r.id]??0):0;
      return {kind:"bar", ds, de, pe, slip, derived:(r.plannedStart==null||r.plannedEnd==null)};
    }
    // division: pure rollup over its initiatives (no own dates)
    const gs=P.initiatives.filter(i=>i.divisionId===r.id).map(i=>geom("initiative",i));
    const starts=gs.map(g=>g.ds).filter(v=>v!=null), ends=gs.map(g=>g.pe!=null?g.pe:g.de).filter(v=>v!=null);
    const ds=starts.length?Math.min.apply(null,starts):null, de=ends.length?Math.max.apply(null,ends):null;
    return {kind:"bar", ds, de, pe:de, slip:0, derived:true};
  }
  const childRefs=(entity,r)=>{
    if(entity==="division") return P.initiatives.filter(i=>i.divisionId===r.id).map(i=>({entity:"initiative",rec:i}));
    if(entity==="initiative") return P.milestones.filter(m=>m.initiativeId===r.id).map(m=>({entity:"milestone",rec:m}))
      .concat(P.objectives.filter(o=>o.initiativeId===r.id).map(o=>({entity:"objective",rec:o})));
    if(entity==="objective") return gatesOf(r).map(g=>({entity:"stagegate",rec:g}));
    return [];
  };
  const visible=g=> g.kind==="bar" ? (g.ds!=null && g.de!=null) : (g.planned!=null);
  // ---- build the full tree (every dated node, so the axis is stable under collapse) ----
  function build(entity, r, depth){
    const g=geom(entity,r); if(!visible(g)) return null;
    const kids=[]; childRefs(entity,r).forEach(c=>{ const n=build(c.entity,c.rec,depth+1); if(n) kids.push(n); });
    return {entity, rec:r, depth, g, kids, key:entity+":"+r.id};
  }
  const roots=[]; P.divisions.forEach(d=>{ const n=build("division",d,0); if(n) roots.push(n); });
  if(!roots.length){ document.getElementById("ganttWrap").innerHTML='<p class="hint">No scheduled, dated items to chart.</p>'; return; }
  // ---- domain over the full tree (+ today) ----
  let lo=Infinity, hi=-Infinity;
  (function scan(n){ const g=n.g;
    if(g.kind==="bar"){ if(g.ds!=null)lo=Math.min(lo,g.ds); if(g.de!=null)hi=Math.max(hi,g.de); if(g.pe!=null)hi=Math.max(hi,g.pe); }
    else { if(g.planned!=null){lo=Math.min(lo,g.planned);hi=Math.max(hi,g.planned);} if(g.eff!=null)hi=Math.max(hi,g.eff); }
    n.kids.forEach(scan);
  });
  roots.forEach(function s(n){ const g=n.g;
    if(g.kind==="bar"){ if(g.ds!=null)lo=Math.min(lo,g.ds); if(g.de!=null)hi=Math.max(hi,g.de); if(g.pe!=null)hi=Math.max(hi,g.pe); }
    else { if(g.planned!=null){lo=Math.min(lo,g.planned);hi=Math.max(hi,g.planned);} if(g.eff!=null)hi=Math.max(hi,g.eff); if(g.baseline!=null){lo=Math.min(lo,g.baseline);hi=Math.max(hi,g.baseline);} }
    n.kids.forEach(s);
  });
  if(isFinite(lo)) lo=Math.min(lo,td); if(isFinite(hi)) hi=Math.max(hi,td);
  if(!isFinite(lo)){ lo=td; } if(!isFinite(hi)||hi<=lo){ hi=lo+1; }
  const LABELW=240, TRACKW=720, x=d=>(d-lo)/(hi-lo)*TRACKW;
  function quarterTicks(a,b){ const s=new Date(EPOCH+a*86400000); let ty=s.getUTCFullYear(), tm=Math.floor(s.getUTCMonth()/3)*3; const out=[]; for(let i=0;i<80;i++){ const day=Math.round((Date.UTC(ty,tm,1)-EPOCH)/86400000); if(day>b) break; out.push({day,label:"Q"+(tm/3+1)+" "+ty}); tm+=3; if(tm>=12){tm-=12;ty++;} } return out; }
  const ticks=quarterTicks(lo,hi);
  // ---- flatten respecting collapse ----
  const rows=[]; roots.forEach(function go(n){ rows.push(n); if(!ganttCollapsed.has(n.key)) n.kids.forEach(go); });
  const hasGates = rows.some(n=>n.entity==="stagegate");
  const NAV={division:1,initiative:1,objective:1,milestone:1};
  const NS={division:"font-size:13.5px;font-weight:600",initiative:"font-size:13px;font-weight:500",objective:"font-size:13px;font-weight:500",milestone:"font-size:12.5px;font-weight:400",stagegate:"font-size:12.5px;font-weight:400"};
  let html=`<div class="gchart" style="width:${LABELW+TRACKW}px">`;
  // quarter gridlines + today, spanning the full chart height behind the rows
  ticks.forEach(t=>{ if(t.day>=lo&&t.day<=hi){ html+=`<div class="ggrid" style="left:${LABELW+x(t.day)}px"></div>`; } });
  if(td>=lo&&td<=hi){ const tx=LABELW+x(td); html+=`<div class="gtoday" style="left:${tx}px"></div><div class="gtodaylbl" style="left:${tx+3}px">today</div>`; }
  // time axis header
  html+=`<div class="gaxis"><div style="width:${LABELW}px;flex:none"></div><div class="gtrack" style="height:22px">`;
  ticks.forEach(t=>{ html+=`<span class="gaxislab" style="left:${Math.max(0,x(t.day))+3}px;bottom:3px">${t.label}</span>`; });
  html+=`</div></div>`;
  rows.forEach(n=>{
    const g=n.g, name=esc(nameOf(n.entity,n.rec)), hasKids=n.kids.length>0, collapsed=ganttCollapsed.has(n.key);
    const tri = hasKids ? `<span class="gtri" data-gtoggle="${n.key}">${collapsed?'▸':'▾'}</span>` : `<span class="gspacer"></span>`;
    const dot = STATUS_ENTITIES[n.entity] ? `<span class="gdot" style="background:${bandColor(nodeBand(n.entity,n.rec.id))}"></span>` : `<span class="gdot" style="visibility:hidden"></span>`;
    const fs=NS[n.entity]||"";
    let nm;
    if(n.entity==="stagegate") nm=`<span class="gname static" style="${fs}">${name}</span>`;
    else if(NAV[n.entity]){ const dim=(n.entity==="milestone")?" dim":""; nm=`<a class="gname${dim}" style="${fs}" data-lineage="${n.entity}:${n.rec.id}">${name}</a>`; }
    else nm=`<span class="gname static" style="${fs}">${name}</span>`;
    html+=`<div class="grow"><div class="glabel" style="padding-left:${n.depth*16+6}px">${tri}${dot}${nm}</div><div class="gtrack">`;
    if(g.kind==="bar"){
      const bx=x(g.ds), bw=Math.max(2,x(g.de)-bx), c=bandColor(nodeBand(n.entity,n.rec.id));
      html+=`<div class="gbar${g.derived?' derived':''}" style="left:${bx}px;width:${bw}px;border-color:${c}"><div class="gbarfill" style="background:${c}"></div></div>`;
      if(g.slip>0 && g.pe!=null){ const sx=x(n.rec.plannedEnd); html+=`<div class="gslip" style="left:${sx}px;width:${Math.max(2,x(g.pe)-sx)}px"></div>`; }
    } else if(g.gate){
      const st=g.state||"pending", ex=x(g.eff!=null?g.eff:g.planned);
      if(g.slipped && g.baseline!=null){
        const bx=x(g.baseline);
        html+=`<div class="gconn committed" style="left:${Math.min(bx,ex)}px;width:${Math.max(2,Math.abs(ex-bx))}px"></div>`;
        html+=`<div class="gdia ghost" style="left:${bx}px" title="committed ${dayToIso(g.baseline)}"></div>`;
      } else if(g.eff!=null && g.planned!=null && g.eff!==g.planned){
        const px=x(g.planned);
        html+=`<div class="gconn" style="left:${Math.min(px,ex)}px;width:${Math.max(2,Math.abs(ex-px))}px"></div>`;
        html+=`<div class="gdia ghost" style="left:${px}px" title="planned ${dayToIso(g.planned)}"></div>`;
      }
      html+=`<div class="gdia ${st}" style="left:${ex}px" title="${st}${g.eff!=null?' · forecast '+dayToIso(g.eff):''}${g.planned!=null?' · planned '+dayToIso(g.planned):''}"></div>`;
    } else {
      html+=`<div class="gdia planned" style="left:${x(g.planned)}px" title="planned"></div>`;
      if(g.eff!=null && g.eff!==g.planned) html+=`<div class="gdia eff" style="left:${x(g.eff)}px" title="projected/actual"></div>`;
    }
    html+=`</div></div>`;
  });
  html+=`</div>`;
  if(hasGates) html+=`<div class="glegend"><span><i style="background:var(--ok)"></i>passed</span><span><i style="background:var(--warn)"></i>passed late</span><span><i style="background:var(--bad)"></i>overdue</span><span><i style="border:1.5px solid #6f8aa3"></i>pending</span><span><i style="border:1.5px dashed #5a728c;opacity:.6"></i>committed / planned</span></div>`;
  const host=document.getElementById("ganttWrap"); host.innerHTML=html;
  host.querySelectorAll("[data-gtoggle]").forEach(t=>t.onclick=()=>{ const k=t.dataset.gtoggle; ganttCollapsed.has(k)?ganttCollapsed.delete(k):ganttCollapsed.add(k); renderGantt(); });
  host.querySelectorAll("[data-lineage]").forEach(a=>a.onclick=()=>{ const s=a.dataset.lineage,i=s.indexOf(":"); openLineage(s.slice(0,i), s.slice(i+1)); });
}

/* ---------------- SLICES tab ---------------- */
function renderSlices(){
  const root = document.getElementById("tab-slices");
  const em = pfMap();
  if(!portfolio.products.length){ root.innerHTML='<p class="hint">No products defined yet. Add products and models in the Portfolio tab to see sliced scores.</p>'; return; }
  const qs = mode==="quarterly" ? quartersAll() : [null];
  let html = `<table><thead><tr><th>Product / Model</th>${qs.map(q=>`<th>${q||'overall'}</th>`).join("")}</tr></thead><tbody>`;
  for(const p of portfolio.products){
    html += `<tr><td><b>${esc(p.name)}</b> <span class="pill">${p.id}</span></td>`+
      qs.map(q=>scoreCell(RD.sliceScore("product",p.id,portfolio,em,q))).join("")+`</tr>`;
    portfolio.models.filter(m=>m.productId===p.id).forEach(m=>{
      html += `<tr><td style="padding-left:26px">↳ ${esc(m.name)} <span class="pill">${m.id}</span></td>`+
        qs.map(q=>scoreCell(RD.sliceScore("model",m.id,portfolio,em,q))).join("")+`</tr>`;
    });
  }
  html += `</tbody></table>
    <p class="hint">A product score aggregates every objective under it across all its models; each model is a sub-aggregate. Toggle <b>Quarterly</b> in the header for per-quarter columns.</p>`;
  root.innerHTML = html;
}
function scoreCell(v){ return `<td><span style="color:${scoreColor(v)};font-weight:600">${fmtScore(v)}</span> ${v==null?'':bandHtml(v)}</td>`; }

/* ---------------- render dispatch ---------------- */
function renderAll(){ renderCompany(); renderPortfolio(); renderGantt(); renderSlices(); renderBrokerStatus(); }
function renderBrokerStatus(){ const el=document.getElementById("brokerStatus");
  el.textContent = tok() ? "Token set. Live sync active." : "No token set — running on local scratch data."; }

/* ---------------- nav + wiring ---------------- */
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>{
  closeEditor(); closeLineage();
  document.querySelectorAll("#nav button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  document.querySelectorAll(".tabsec").forEach(s=>s.classList.remove("active"));
  document.getElementById("tab-"+b.dataset.tab).classList.add("active");
});
document.querySelectorAll("#modeToggle button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#modeToggle button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); mode=b.dataset.mode; renderCompany(); renderSlices();
});
document.getElementById("saveBtn").onclick = saveAll;
document.getElementById("tokenSave").onclick = ()=>{ localStorage.setItem("rd_broker_token",
  document.getElementById("tokenInput").value.trim()); setMsg("Token saved.", "ok"); loadAll(); };
document.getElementById("pfModalClose").onclick = closeEditor;
document.getElementById("pfKpiClose").onclick = closeKpiEditor;
document.getElementById("lnClose").onclick = closeLineage;
document.getElementById("lnEdit").onclick = editFocused;
document.addEventListener("keydown", e=>{ if(e.key==="Escape"){
  const ln=document.getElementById("lnModal"); if(ln && !ln.hidden){ closeLineage(); return; }
  const m=document.getElementById("pfModal"); if(m && !m.hidden) closeEditor(); } });
window.addEventListener("beforeunload", stopPoll);

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

/* boot */
renderAll();
loadAll();
</script>
